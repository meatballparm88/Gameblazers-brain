/* ================================================================
   ⚖️ COMPARE — side by side, best value per row highlighted
   ================================================================ */
function cmpAdd(c){
  const k=noteKey(c);
  if(CMP.some(x=>noteKey(x)===k)){toast('Already in the comparison.');return;}
  if(CMP.length>=4){toast('Compare holds 4 cards. Remove one first.');return;}
  CMP.push(c); renderCompare(); toast(`${c.player} added to Compare.`);
}
function renderCompare(){
  if(!CMP.length){
    $('#cmp').innerHTML=`<div class="card"><h3>⚖️ Compare</h3>
      <div class="empty">Nothing selected yet.<br><br>Add cards with the <b>⚖</b> button in Inventory, Buy/Hold/Sell, or from any card's detail sheet. Up to 4 at once.</div></div>`;
    return;
  }
  // rows: [label, accessor, higher-is-better?, formatter]
  const R=[
    ['Value',      c=>c.est,                 1, v=>fmt$(v)],
    ['Salary',     c=>c.sal,                 1, v=>fmt$(v)],
    ['Multiplier', c=>c.mult,                1, v=>'×'+v],
    ['Overall',    c=>c.ovr||0,              1, v=>v||'—'],
    ['Tier',       c=>c.tier,             null, v=>v],
    ['Verdict',    c=>c.verdict,          null, v=>`<span class="vbtn v-${String(v).toLowerCase()} sm">${v}</span>`],
    ['Edge',       c=>c.edge==null?null:+c.edgePct, 1, v=>v==null?'—':`<span class="${v>=0?'up':'down'}">${v>=0?'+':''}${v}%</span>`],
    ['Confidence', c=>c.conf,             null, v=>v],
    ['Form',       c=>c.formScore!=null&&c.formScore>=0?c.formScore:null, 1, (v,c)=>formBadge(c)],
    ['Projection', c=>c.proj!=null?+c.proj:null, 1, v=>v==null?'—':v.toFixed(1)+' pts'],
    ['Proj. value',c=>c.projVal!=null?+c.projVal:null,1, v=>v==null?'—':v.toFixed(1)],
    ['Market med', c=>c.mkt&&c.mkt.med!=null?c.mkt.med:null, null, v=>v==null?'—':fmt$(v)],
    ['Expires',    c=>c.days!=null&&c.exp?c.days:null, 1, (v,c)=>c.exp?`${c.days}d <span class=muted>${c.exp}</span>`:'<span class=muted>never</span>'],
    ['Listable',   c=>listable(c)?1:0,      1, v=>v?'<span class=up>yes</span>':'<span class=down>locked</span>'],
    ['Status',     c=>c.st,               null, v=>v]
  ];
  const best=(acc,hib)=>{
    if(hib==null)return -1;
    let bi=-1,bv=null;
    CMP.forEach((c,i)=>{const v=acc(c); if(v==null||isNaN(v))return; if(bv==null||(hib?v>bv:v<bv)){bv=v;bi=i;}});
    return CMP.filter(c=>{const v=acc(c);return v!=null&&!isNaN(v);}).length<2?-1:bi;
  };
  const head=CMP.map((c,i)=>`<th><div class="cmp-h">${playerLink(c)}<button class="btn xs ghost cmpDel" data-i="${i}">✕</button></div>
      <div class="muted cmp-sub">${c.pos} · ${c.team} · <span class="mult-chip">×${c.mult}</span></div>
      <div class="muted cmp-sub">${c.col}</div></th>`).join('');
  const body=R.map(([label,acc,hib,fmt])=>{
    const bi=best(acc,hib);
    return `<tr><td class="cmp-lbl">${label}</td>${CMP.map((c,i)=>{
      const v=acc(c);
      return `<td class="${i===bi?'cmp-best':''}">${fmt(v,c)}</td>`;}).join('')}</tr>`;
  }).join('');
  $('#cmp').innerHTML=`<div class="card"><h3>⚖️ Compare (${CMP.length})</h3>
    <div class="muted" style="margin-bottom:10px">Best value in each row is highlighted. Tap any name to open it in GameBlazers.</div>
    <div class="tbl-wrap cmp-wrap"><table class="cmp-tbl"><thead><tr><th></th>${head}</tr></thead><tbody>${body}</tbody></table></div>
    <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn ghost" id="cmpClear">Clear all</button>
      <button class="btn ghost" id="cmpCsv">⬇ Export comparison</button>
    </div></div>`;
  $$('.cmpDel').forEach(b=>b.onclick=()=>{CMP.splice(+b.dataset.i,1);renderCompare();});
  $('#cmpClear').onclick=()=>{CMP=[];renderCompare();};
  $('#cmpCsv').onclick=()=>{
    const strip=s=>String(s).replace(/<[^>]*>/g,'');
    const lines=[['Metric',...CMP.map(c=>c.player+' x'+c.mult)].join(',')];
    R.forEach(([label,acc,,fmt])=>lines.push([label,...CMP.map(c=>{const v=acc(c);return '"'+strip(fmt(v,c)).replace(/"/g,'""')+'"';})].join(',')));
    downloadText(lines.join('\n'),'card-comparison.csv'); toast('Comparison exported.');
  };
}

// When does each card fall out of the listable window? Plan sells weeks ahead.
function lockCalendar(){
  const weeks=12, buckets=Array.from({length:weeks},()=>({n:0,val:0}));
  DATA.forEach(c=>{
    if(!c.exp||!c.tr)return;
    const toLock=c.days-LIST_MIN_DAYS;                 // days until it can no longer be listed
    if(toLock<0||toLock>weeks*7)return;
    const w=Math.floor(toLock/7); buckets[w].n++; buckets[w].val+=c.est;
  });
  const max=Math.max(1,...buckets.map(b=>b.n));
  const rows=buckets.map((b,i)=>{
    const from=new Date(TODAY.getTime()+i*7*86400000), to=new Date(TODAY.getTime()+((i+1)*7-1)*86400000);
    const lbl=`${from.toLocaleDateString('en-US',{month:'short',day:'numeric'})}–${to.toLocaleDateString('en-US',{month:'short',day:'numeric'})}`;
    return `<div class="bar"><div class="nm" title="${lbl}">${i===0?'This week':lbl}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${b.n/max*100}%;${i<2?'background:linear-gradient(90deg,var(--amber),var(--red))':''}"></div></div>
      <div class="vv">${b.n} · ${fmtK(b.val)}</div></div>`;}).join('');
  const soon=buckets.slice(0,2).reduce((s,b)=>s+b.n,0);
  return `<div class="card"><h3>🗓 Lock calendar — when cards stop being listable</h3>${rows}
    <div class="legend">Each bar is the week a card crosses the ${LIST_MIN_DAYS}-day line and can no longer be listed.
      <b>${soon} card${soon===1?'':'s'} lock in the next 2 weeks</b> — list those first.</div></div>`;
}

function restoreData(text){
  let d=null; try{d=JSON.parse(text);}catch(e){}
  if(!d||!d.data){toast('That doesn’t look like a Master Brain backup.');return;}
  Object.entries(d.data).forEach(([k,v])=>{try{localStorage.setItem(k,v);}catch(e){}});
  toast('Restored — reloading…'); setTimeout(()=>location.reload(),900);

        c=>`${c.projVal!=null?'proj '+c.projVal+' pts · ':''}play within ${c.days}d (expires ${c.exp}) — can't be listed`)

/* ===== Lineup builder (optimal starting roster by projected points) ===== */
let lineCfg=null;
function loadLineCfg(){ if(lineCfg)return lineCfg; try{lineCfg=JSON.parse(localStorage.getItem('gb_lineup'))||null;}catch(e){} lineCfg=lineCfg||{Qb:1,Rb:2,Wr:3,Te:1,Flex:1}; return lineCfg; }
function saveLineCfg(){ localStorage.setItem('gb_lineup',JSON.stringify(lineCfg)); }
function buildLineup(cfg){
  const pool={Qb:[],Rb:[],Wr:[],Te:[]};
  DATA.filter(c=>c.proj!=null && !(c.exp&&c.days<0)).forEach(c=>{ if(pool[c.pos]) pool[c.pos].push(c); });
  Object.values(pool).forEach(a=>a.sort((x,y)=>y.projVal-x.projVal));
  const used=new Set(), id=c=>c.id||keyOf(c), picks={Qb:[],Rb:[],Wr:[],Te:[],Flex:[]};
  const take=(pos,n)=>{let k=0;for(const c of pool[pos]){if(k>=n)break;if(used.has(id(c)))continue;used.add(id(c));picks[pos].push(c);k++;}};
  take('Qb',cfg.Qb);take('Rb',cfg.Rb);take('Wr',cfg.Wr);take('Te',cfg.Te);
  const flex=['Rb','Wr','Te'].flatMap(p=>pool[p]).filter(c=>!used.has(id(c))).sort((a,b)=>b.projVal-a.projVal);
  for(let i=0;i<cfg.Flex&&i<flex.length;i++){used.add(id(flex[i]));picks.Flex.push(flex[i]);}
  const all=[...picks.Qb,...picks.Rb,...picks.Wr,...picks.Te,...picks.Flex];
  return {picks,all,total:+all.reduce((s,c)=>s+(c.projVal||0),0).toFixed(1)};
}
function renderLineup(){
  const cfg=loadLineCfg(), L=buildLineup(cfg);
  const projd=DATA.filter(c=>c.proj!=null).length;
  const slotRow=(label,c)=>{const url=c?urlFor(c):null;
    return `<div class="lslot"><span class="lpos">${label}</span>${c?`<span class="lnm">${url?`<a href="${url}" target="_blank" rel="noopener">${c.player}</a>`:c.player} <span class=muted>${c.team} ×${c.mult}</span></span><span class="lproj">${c.projVal} <small>pts</small></span>`:'<span class="muted">— no eligible card —</span>'}</div>`;};
  const rows=[['QB',L.picks.Qb],['RB',L.picks.Rb],['WR',L.picks.Wr],['TE',L.picks.Te],['FLEX',L.picks.Flex]]
    .flatMap(([lab,arr])=>arr.length?arr.map(c=>slotRow(lab,c)):[slotRow(lab,null)]).join('');
  const cfgCtl=['Qb','Rb','Wr','Te','Flex'].map(p=>`<label class="lcfg"><span>${p==='Flex'?'FLEX':p.toUpperCase()}</span><input type="number" min="0" max="6" id="lc_${p}" value="${cfg[p]}"></label>`).join('');
  $('#lineup').innerHTML=`
  <div class="kpis">
    <div class="kpi"><div class="lbl">Projected total</div><div class="val" style="color:var(--green)">${L.total}</div><div class="meta">payout-weighted (×multiplier)</div></div>
    <div class="kpi"><div class="lbl">Starters</div><div class="val">${L.all.length}</div><div class="meta">${projd} cards have recent-form data</div></div>
  </div>
  <div class="card"><h3>Formation</h3><div class="lcfgrow">${cfgCtl}<button class="btn ghost" id="lreset">Reset</button></div>
    <div class="legend">Projection = recent-game scoring (recent weeks weighted heavier) × your multiplier. Adjust slots to match the contest you're entering. Expired cards are excluded.</div></div>
  <div class="card"><h3>Optimal starting lineup</h3>${rows}</div>`;
  ['Qb','Rb','Wr','Te','Flex'].forEach(p=>{const el=$('#lc_'+p);el.onchange=()=>{cfg[p]=Math.max(0,Math.min(6,+el.value||0));saveLineCfg();renderLineup();};});
  $('#lreset').onclick=()=>{lineCfg={Qb:1,Rb:2,Wr:3,Te:1,Flex:1};saveLineCfg();renderLineup();};
}

function renderStacks(){

    // sell the copy closest to expiring first; tie-break on lowest multiplier (least upside)
    const order=[...cards].sort((a,b)=>{const ax=a.exp?a.days:1e9,bx=b.exp?b.days:1e9;return ax-bx||a.mult-b.mult;});
    return {player,cards,n:cards.length,total:cards.reduce((s,c)=>s+c.est,0),first:order[0],
      mkt:cards.find(c=>c.mkt)?cards.find(c=>c.mkt).mkt:null,c0:cards[0]};
  }).sort((a,b)=>b.total-a.total);
  const dupes=stacks.filter(s=>s.n>1);
  const row=s=>`<div class="sig-item"><div class="top">

  $('#stacks').innerHTML=`
  <div class="kpis">
    <div class="kpi"><div class="lbl">Unique players</div><div class="val">${stacks.length}</div><div class="meta">${DATA.length} cards total</div></div>
    <div class="kpi"><div class="lbl">Stacked players</div><div class="val" style="color:var(--amber)">${dupes.length}</div><div class="meta">you own 2+ copies</div></div>

  </div>

function smartIngest(text,name){
  const head=(text||'').slice(0,400);
  const isRoster=/(^|\n)\s*"?Player"?\s*,\s*"?Positions"?/i.test(head)||/Multiplier/i.test(head.split('\n')[0]||'');
  if(isRoster){ ingest(text); return; }
  const looksListing=(text.split(/\r?\n/).find(l=>l.trim())||'').split(',').length>=9 && /,\s*(expiring|franchise)\s*,/i.test(head);
  if(looksListing){ ingestListings(text); return; }

}

const TABORDER=()=>$$('.tab').map(t=>t.dataset.v);
function stepView(dir){
  const o=TABORDER(), cur=($$('.tab').find(t=>t.classList.contains('active'))||{dataset:{}}).dataset.v;
  const i=o.indexOf(cur); if(i<0)return;
  const n=i+dir; if(n<0||n>=o.length)return;
  const el=$('#'+o[n]); if(el){el.classList.add('view-in');setTimeout(()=>el.classList.remove('view-in'),260);}
  switchView(o[n]);

(function(){
  let x0=null,y0=null,t0=0;
  const m=document.querySelector('main');
  m.addEventListener('touchstart',e=>{if(e.touches.length!==1)return;x0=e.touches[0].clientX;y0=e.touches[0].clientY;t0=Date.now();},{passive:true});
  m.addEventListener('touchend',e=>{
    if(x0==null)return;
    const t=e.changedTouches[0], dx=t.clientX-x0, dy=t.clientY-y0;
    x0=null;
    if(Date.now()-t0>600)return;                       // too slow to be a flick
    if(Math.abs(dx)<60||Math.abs(dx)<Math.abs(dy)*1.8)return;  // must be clearly horizontal
    // don't hijack swipes that start inside a horizontally scrollable table
    let n=t.target;
    while(n&&n!==m){ if(n.scrollWidth>n.clientWidth+8)return; n=n.parentElement; }
    stepView(dx<0?1:-1);
  },{passive:true});
})();
// sheet: tap scrim, swipe down, or Esc to dismiss
$('#sheetScrim').onclick=closeSheet;
(function(){
  let sy=null; const sh=$('#sheet');
  sh.addEventListener('touchstart',e=>{sy=e.touches[0].clientY;},{passive:true});
  sh.addEventListener('touchmove',e=>{
    if(sy==null)return; const d=e.touches[0].clientY-sy;
    if(d>0&&sh.scrollTop<=0) sh.style.transform=`translateY(${d}px)`;
  },{passive:true});
  sh.addEventListener('touchend',e=>{
    if(sy==null)return; const d=e.changedTouches[0].clientY-sy; sy=null;
    sh.style.transform=''; if(d>110) closeSheet();
  },{passive:true});
})();
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&!$('#sheetWrap').hidden) closeSheet();
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  if(e.key==='ArrowRight')stepView(1); if(e.key==='ArrowLeft')stepView(-1);
});
