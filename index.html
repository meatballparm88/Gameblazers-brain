<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GB Brain">
<meta name="theme-color" content="#0b0f17">
<title>GameBlazers Master Brain</title>
<style>
:root{
  --bg:#0b0f17;--panel:#141b2b;--panel2:#1b2538;--line:#26314a;--txt:#e8edf6;--mut:#8b97ad;
  --acc:#3b82f6;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--purple:#a855f7;--cyan:#06b6d4;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
a{color:var(--acc)}
header{padding:18px 24px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#101725,#0b0f17);position:sticky;top:0;z-index:20}
.htop{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:12px}
.logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--acc),var(--purple));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px}
h1{font-size:18px;font-weight:700;letter-spacing:.2px}
.sub{color:var(--mut);font-size:12px}
.upwrap{display:flex;align-items:center;gap:10px}
.btn{background:var(--acc);color:#fff;border:0;border-radius:8px;padding:9px 14px;font-weight:600;cursor:pointer;font-size:13px}
.btn.ghost{background:var(--panel2);border:1px solid var(--line);color:var(--txt)}
.btn:hover{filter:brightness(1.08)}
.drop{border:1.5px dashed var(--line);border-radius:10px;padding:8px 14px;color:var(--mut);font-size:12px;cursor:pointer}
.drop.over{border-color:var(--acc);background:#13203a;color:var(--txt)}
nav{display:flex;gap:4px;padding:10px 24px 0;border-bottom:1px solid var(--line);background:var(--bg);position:sticky;top:73px;z-index:19;flex-wrap:wrap}
.tab{padding:10px 16px;color:var(--mut);cursor:pointer;border-bottom:2px solid transparent;font-weight:600;font-size:13px}
.tab.active{color:var(--txt);border-bottom-color:var(--acc)}
main{padding:22px 24px 60px;max-width:1500px;margin:0 auto}
.view{display:none}.view.active{display:block}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:22px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
.kpi .lbl{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.kpi .val{font-size:26px;font-weight:800;margin-top:6px}
.kpi .meta{font-size:11px;color:var(--mut);margin-top:4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
@media(max-width:1000px){.grid2,.grid3{grid-template-columns:1fr}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:18px}
.card h3{font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);margin-bottom:14px;font-weight:700}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.bar-row .nm{width:120px;font-size:12px;color:var(--txt);flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;background:var(--panel2);border-radius:6px;height:18px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--acc),var(--cyan))}
.bar-row .vv{width:90px;text-align:right;font-size:12px;color:var(--mut);flex-shrink:0}
.linkbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:12px}
.lb-stat{font-size:13px;color:var(--txt)}
.lb-miss{color:#fcd34d;font-weight:600}
.lb-actions{display:flex;gap:8px;flex-wrap:wrap}
.lb-actions .btn{padding:7px 11px;font-size:12px}
.linkcell{white-space:nowrap}
.gblink{color:var(--cyan);font-weight:600;text-decoration:none}
.gblink:hover{text-decoration:underline}
.lnkadd{background:rgba(245,158,11,.16);color:#fcd34d;border:1px solid #5c4a1f;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;cursor:pointer}
.lnkadd:hover{filter:brightness(1.15)}
.lnkfind{background:var(--panel2);color:var(--cyan);border:1px solid var(--line);border-radius:6px;padding:3px 8px;font-size:11px;font-weight:600;cursor:pointer}
.lnkfind:hover{filter:brightness(1.2)}
.lnkhl{background:rgba(34,197,94,.14);color:#86efac;border:1px solid #2f5c3a;border-radius:6px;padding:3px 7px;font-size:12px;cursor:pointer}
.lnkhl:hover{filter:brightness(1.2)}
.lnkedit{background:transparent;border:0;color:var(--mut);cursor:pointer;font-size:12px}
.lnkedit:hover{color:var(--txt)}
td a{color:var(--txt);text-decoration:none;border-bottom:1px dotted var(--cyan)}
td a:hover{color:var(--cyan)}
.askbox{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#15203a,#1a1530);border:1px solid #2f3d5e;border-radius:12px;padding:10px 12px;margin-bottom:10px}
.askbox-hero{padding:15px 18px;margin-bottom:12px;box-shadow:0 4px 24px rgba(59,130,246,.12)}
.askbox-hero input{font-size:15px}
.askbox-hero .askic{font-size:22px}
.askbox .askic{color:var(--purple);font-size:18px}
.askbox input{flex:1;min-width:120px;background:transparent;border:0;color:var(--txt);font-size:14px;padding:6px 2px;outline:none}
.askbox input::placeholder{color:#6b7790}
.askres{font-size:13px;color:var(--txt);margin-bottom:10px}
.askres.warn{color:#fcd34d}
.qchip{display:inline-block;background:rgba(168,85,247,.18);color:#d8b4fe;border:1px solid #3a2d55;border-radius:20px;padding:3px 10px;margin:0 6px 4px 0;font-size:12px;font-weight:600}
.askex{font-size:11px;color:var(--mut);margin-bottom:14px}
.exq{cursor:pointer;border:1px dashed var(--line);border-radius:14px;padding:3px 9px;margin:0 6px 6px 0;display:inline-block;color:var(--mut)}
.exq:hover{border-color:var(--acc);color:var(--txt)}
.fpanel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px;display:flex;flex-direction:column;gap:11px}
.frow{display:flex;gap:11px;align-items:flex-end;flex-wrap:wrap}
.frow.c2{display:grid;grid-template-columns:1fr 280px;gap:11px}
.frow.c3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
@media(max-width:820px){.frow.c2,.frow.c3{grid-template-columns:1fr}}
.fctl{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:9px;padding:10px 11px;font-size:13.5px}
.fld{display:flex;flex-direction:column;gap:5px}
.fld>span{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut)}
.frow.c3 .btn{height:39px;align-self:flex-end}
.fgroup{display:flex;flex-direction:column;gap:7px}
.flbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut)}
.multchips{display:flex;gap:6px;flex-wrap:wrap}
.mchip{background:var(--panel2);border:1px solid var(--line);border-radius:18px;padding:7px 12px;font-size:12.5px;color:var(--mut);cursor:pointer;min-width:46px;text-align:center}
.mchip.on{background:var(--acc);color:#fff;border-color:var(--acc)}
.rng{display:flex;align-items:center;gap:8px}
.rng span{color:var(--mut)}
.fnum{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:9px;padding:9px 10px;font-size:13.5px;width:100%;min-width:0}
.formcell{white-space:nowrap}
.fmtag{font-size:11px;font-weight:700;padding:2px 7px;border-radius:20px;border:1px solid var(--line)}
.fmtag.fm-hot{background:rgba(239,68,68,.16);color:#fca5a5}
.fmtag.fm-cold{background:rgba(59,130,246,.16);color:#93c5fd}
.fmtag.fm-up{background:rgba(34,197,94,.15);color:#86efac}
.fmtag.fm-down{background:rgba(245,158,11,.14);color:#fcd34d}
.fmtag.fm-mid{background:var(--panel2);color:var(--mut)}
.spark5{display:inline-flex;align-items:flex-end;gap:2px;height:16px;width:36px;margin-left:6px;vertical-align:middle}
.spark5 i{flex:1;background:linear-gradient(180deg,var(--cyan),var(--acc));border-radius:1px;min-height:2px}
.dual{position:relative;height:30px;margin:6px 0 2px}
.dual-track{position:absolute;top:13px;left:0;right:0;height:5px;background:var(--panel2);border-radius:4px}
.dual-fill{position:absolute;top:0;bottom:0;background:linear-gradient(90deg,var(--acc),var(--cyan));border-radius:4px}
.dual input[type=range]{position:absolute;top:0;left:0;width:100%;height:30px;margin:0;background:none;-webkit-appearance:none;appearance:none;pointer-events:none}
.dual input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;background:#fff;border:3px solid var(--acc);cursor:pointer;pointer-events:auto;box-shadow:0 1px 4px rgba(0,0,0,.5)}
.dual input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:#fff;border:3px solid var(--acc);cursor:pointer;pointer-events:auto}
.exppresets{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px}
.exppreset{cursor:pointer}
.verdrow{display:flex;justify-content:space-between;align-items:center;gap:10px}
.verdicts{display:flex;gap:7px;flex-wrap:wrap}
.vbtn{border:1px solid var(--line);border-radius:8px;padding:7px 13px;font-size:12.5px;font-weight:700;color:var(--mut);cursor:pointer;background:var(--panel2)}
.vbtn.sm{padding:2px 8px;font-size:11px;border-radius:20px;cursor:default}
.vbtn.v-buy{color:#86efac}.vbtn.v-watch{color:#93c5fd}.vbtn.v-fair{color:#fcd34d}.vbtn.v-avoid{color:#fca5a5}
.vbtn.on{background:var(--acc);color:#fff;border-color:var(--acc)}
.vbtn.on.v-buy{background:#16a34a;border-color:#16a34a}.vbtn.on.v-watch{background:#2563eb;border-color:#2563eb}.vbtn.on.v-fair{background:#b45309;border-color:#b45309}.vbtn.on.v-avoid{background:#b91c1c;border-color:#b91c1c}
.vbtn.v-buy.sm{background:rgba(34,197,94,.15)}.vbtn.v-watch.sm{background:rgba(59,130,246,.15)}.vbtn.v-fair.sm{background:rgba(245,158,11,.13)}.vbtn.v-avoid.sm{background:rgba(239,68,68,.15)}
.filters{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px}
select,input[type=text]{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 10px;font-size:13px}
input[type=text]{min-width:240px}
.chip{background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:6px 12px;font-size:12px;cursor:pointer;color:var(--mut)}
.chip.on{background:var(--acc);color:#fff;border-color:var(--acc)}
.tbl-wrap{overflow:auto;border:1px solid var(--line);border-radius:12px;max-height:70vh}
table{border-collapse:collapse;width:100%;font-size:13px}
th{position:sticky;top:0;background:var(--panel2);text-align:left;padding:10px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--mut);cursor:pointer;white-space:nowrap;border-bottom:1px solid var(--line)}
th:hover{color:var(--txt)}
td{padding:9px 12px;border-bottom:1px solid #1b2335;white-space:nowrap}
tr:hover td{background:#161f33}
.pill{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.pill.sell{background:rgba(239,68,68,.18);color:#fca5a5}
.pill.buy{background:rgba(34,197,94,.18);color:#86efac}
.pill.hold{background:rgba(245,158,11,.16);color:#fcd34d}
.pill.fr{background:rgba(168,85,247,.18);color:#d8b4fe}
.tag{font-size:10px;color:var(--mut);border:1px solid var(--line);border-radius:5px;padding:1px 5px}
.exp-soon{color:#fca5a5;font-weight:600}
.exp-warn{color:#fcd34d}
.muted{color:var(--mut)}
.up{color:var(--green)}.down{color:var(--red)}
.pager{display:flex;gap:8px;align-items:center;justify-content:flex-end;margin-top:12px;color:var(--mut);font-size:12px}
.pager button{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:6px;padding:5px 10px;cursor:pointer}
.sig-col{display:flex;flex-direction:column;gap:10px}
.sig-item{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:11px 13px}
.sig-item .top{display:flex;justify-content:space-between;gap:8px;align-items:center}
.sig-item .nm{font-weight:700}
.sig-item .rsn{color:var(--mut);font-size:12px;margin-top:3px}
.empty{color:var(--mut);text-align:center;padding:40px;font-size:13px}
.srcbar{background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--cyan);border-radius:9px;padding:10px 13px;margin-bottom:14px;font-size:12.5px;line-height:1.6}
.legend{font-size:11px;color:var(--mut);margin-top:8px}
.lqrow{display:flex;align-items:center;gap:11px;padding:10px 4px;border-bottom:1px solid #1b2335;font-size:13.5px}
.lqrow:last-of-type{border:0}
.lqchk{width:18px;height:18px;accent-color:var(--green);flex-shrink:0;cursor:pointer}
.lqn{flex:1;min-width:0}
.lqwhy{display:inline-block;background:var(--panel2);border:1px solid var(--line);color:var(--mut);border-radius:20px;padding:1px 8px;font-size:10.5px;margin-left:6px}
.lqp{width:118px;text-align:right;color:var(--green);font-weight:700}
.lqp small{display:block;color:var(--mut);font-weight:400;font-size:10.5px}
.lqm{width:170px;text-align:right;color:var(--mut);font-size:11.5px}
.lqcopy,.lqunmark{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:6px;padding:4px 8px;font-size:11.5px;cursor:pointer}
.lslot{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid #1b2335}
.lslot:last-child{border:0}
.lpos{width:52px;font-size:11px;font-weight:800;color:var(--mut);letter-spacing:.5px}
.lnm{flex:1;font-weight:600}
.lproj{font-weight:800;color:var(--green)}.lproj small{color:var(--mut);font-weight:400;font-size:11px}
.lcfgrow{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.lcfg{display:flex;flex-direction:column;gap:5px}
.lcfg span{font-size:10.5px;text-transform:uppercase;color:var(--mut);letter-spacing:.4px}
.lcfg input{width:64px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 10px;font-size:14px}
.spark{display:flex;align-items:flex-end;gap:6px;height:90px}
.spark .col{flex:1;background:linear-gradient(180deg,var(--acc),var(--purple));border-radius:4px 4px 0 0;min-height:3px;position:relative}
.spark .col span{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--mut);white-space:nowrap}
.spark-x{display:flex;gap:6px;margin-top:6px}
.spark-x div{flex:1;text-align:center;font-size:10px;color:var(--mut)}
.gbov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:60;display:flex;align-items:center;justify-content:center;padding:20px}
.gbmodal{background:var(--panel);border:1px solid var(--line);border-radius:14px;max-width:560px;width:100%;padding:20px 22px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.gbm-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.gbm-h h3{font-size:16px}
.gbm-x{background:transparent;border:0;color:var(--mut);font-size:18px;cursor:pointer}
.gbm-x:hover{color:var(--txt)}
.gbm-steps{margin:0 0 16px;padding-left:20px;display:flex;flex-direction:column;gap:9px}
.gbm-steps li{font-size:13.5px;line-height:1.5}
.gbm-act{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.gbm-note{font-size:12px;color:var(--mut);background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;line-height:1.5}
.scanprog{padding:14px 2px}
.pbar{height:7px;background:var(--panel2);border-radius:5px;overflow:hidden;margin-top:9px}
.pbar>div{height:100%;width:0;background:linear-gradient(90deg,var(--acc),var(--cyan));transition:width .2s}
#scanBody{max-height:66vh;overflow:auto}
.scard{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:13px;margin-bottom:11px}
.stitle{font-weight:700;font-size:15px;margin-bottom:9px}
.lmult{display:inline-block;background:var(--acc);color:#fff;font-size:13px;font-weight:800;padding:2px 9px;border-radius:7px;margin-left:6px;vertical-align:middle}
.btgt{display:inline-block;background:#16a34a;color:#fff;font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:20px;margin-left:6px;vertical-align:middle;letter-spacing:.3px}
.smeta{font-weight:400;font-size:12.5px;color:var(--mut);margin-top:3px}
.svar{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:11px;margin-top:8px}
.svar.hit{border-color:var(--acc);box-shadow:0 0 0 1px var(--acc)}
.svtop{display:flex;align-items:center;gap:8px;font-size:14px}
.hitb{background:rgba(59,130,246,.18);color:#93c5fd;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:20px}
.svar .gblink{display:inline-block;margin-top:8px}
/* ===== Phone layout — one app for desktop and mobile ===== */
/* ===== Player links — one look everywhere ===== */
.pname{color:var(--cyan);text-decoration:none;font-weight:600;border-bottom:1px solid rgba(6,182,212,.30)}
.pname:active{opacity:.6}
.pname-fuzzy{color:var(--amber);border-bottom-style:dotted;border-bottom-color:rgba(245,158,11,.40)}
.pn-q{font-size:10px;opacity:.75}
.mult-chip{display:inline-block;background:rgba(168,85,247,.18);color:#c4b5fd;border:1px solid rgba(168,85,247,.35);
  border-radius:6px;padding:1px 6px;font-size:11px;font-weight:700;letter-spacing:.02em}

/* ===== Row tools ===== */
.rowtools{display:inline-flex;gap:3px;margin-left:6px;vertical-align:middle}
.rt{background:transparent;border:1px solid var(--line);color:var(--mut);border-radius:6px;
  font-size:11px;line-height:1;padding:3px 5px;cursor:pointer}
.rt:hover{color:var(--txt);border-color:var(--cyan)}
.btn.xs{padding:4px 8px;font-size:11.5px}

/* ===== Targets ===== */
.tgt-form{display:grid;grid-template-columns:2fr .7fr .9fr 2fr auto;gap:8px;margin-bottom:8px}
.tgt-form input{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:9px 10px;font-size:13px}
.tg-suggest{display:flex;flex-direction:column;gap:2px}
.tg-sug{text-align:left;background:var(--panel2);border:1px solid var(--line);color:var(--txt);
  border-radius:8px;padding:8px 10px;font-size:13px;cursor:pointer}
.tg-sug:hover{border-color:var(--cyan)}
.tgt-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:11px 12px;border:1px solid var(--line);
  border-radius:10px;margin-bottom:7px;background:var(--panel2);border-left-width:3px}
.tgt-row.t-hit{border-left-color:var(--green)}
.tgt-row.t-close{border-left-color:var(--amber)}
.tgt-row.t-far{border-left-color:var(--line)}
.tgt-row.t-bought{border-left-color:var(--purple);opacity:.6}
.tgt-row.t-none{border-left-color:var(--line)}
.tgt-main{flex:1 1 200px;min-width:0}
.tgt-nm{font-weight:600;margin-bottom:2px}
.tgt-sub{font-size:12px}
.tgt-nums{display:flex;gap:14px;font-size:12.5px;flex-wrap:wrap}
.tgt-act{display:flex;gap:6px;align-items:center}
.tgt-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px;border:1px solid var(--line)}
.tgt-badge.t-hit{color:var(--green);border-color:rgba(34,197,94,.45);background:rgba(34,197,94,.12)}
.tgt-badge.t-close{color:var(--amber);border-color:rgba(245,158,11,.40)}
.tgt-badge.t-bought{color:var(--purple)}
.tgt-badge.t-far,.tgt-badge.t-none{color:var(--mut)}

/* ===== Compare ===== */
.cmp-tbl{width:100%;border-collapse:collapse}
.cmp-tbl th,.cmp-tbl td{padding:9px 11px;border-bottom:1px solid var(--line);text-align:left;font-size:13px;vertical-align:top}
.cmp-tbl thead th{position:sticky;top:0;background:var(--panel);z-index:2}
.cmp-lbl{color:var(--mut);font-size:12px;white-space:nowrap;position:sticky;left:0;background:var(--panel);z-index:1}
.cmp-best{background:rgba(34,197,94,.10);box-shadow:inset 2px 0 0 var(--green)}
.cmp-h{display:flex;gap:6px;align-items:center;justify-content:space-between}
.cmp-sub{font-size:11px;font-weight:400}
.cmp-wrap{overflow:auto}

/* ===== Notes ===== */
.note-row{border:1px solid var(--line);border-radius:10px;padding:11px 12px;margin-bottom:8px;background:var(--panel2)}
.note-top{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
.note-body{white-space:pre-wrap;font-size:13.5px;line-height:1.5;padding:8px 10px;background:var(--panel);border-radius:8px}
.note-foot{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:7px;font-size:12px}

/* ===== Reports ===== */
.report{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px}
.rep-head{border-bottom:2px solid var(--line);padding-bottom:12px;margin-bottom:16px}
.rep-head h2{margin:0 0 4px;font-size:20px}
.rep-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:18px}
.report h4{margin:16px 0 7px;font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--mut)}
.rep-tbl{width:100%;border-collapse:collapse;font-size:13px}
.rep-tbl td,.rep-tbl th{padding:5px 8px;border-bottom:1px solid var(--line);text-align:left}
.rep-tbl th{color:var(--mut);font-size:11px;text-transform:uppercase}
.rep-tbl.wide td:first-child{width:45%}
.rep-foot{margin-top:20px;padding-top:12px;border-top:1px solid var(--line);font-size:11px}

/* ===== Bottom sheet ===== */
.sheet-wrap{position:fixed;inset:0;z-index:200}
.sheet-scrim{position:absolute;inset:0;background:rgba(0,0,0,.55);opacity:0;transition:opacity .22s ease}
.sheet-wrap.open .sheet-scrim{opacity:1}
.sheet{position:absolute;left:50%;bottom:0;width:min(560px,100%);transform:translate(-50%,100%);
  background:var(--panel);border:1px solid var(--line);border-radius:18px 18px 0 0;
  padding:8px 18px calc(20px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto;
  transition:transform .24s cubic-bezier(.32,.72,0,1);-webkit-overflow-scrolling:touch}
.sheet-wrap.open .sheet{transform:translate(-50%,0)}
.sheet-grab{width:38px;height:4px;border-radius:99px;background:var(--line);margin:6px auto 14px}
.sh-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}
.sh-nm{font-size:17px;font-weight:700;margin-bottom:3px}
.sh-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:14px}
.sh-kpis>div{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:8px 9px}
.sh-kpis span{display:block;font-size:10.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.sh-kpis b{font-size:14px}
.sh-mkt,.sh-note{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:10px 12px;margin-bottom:12px;font-size:13px;line-height:1.5}
.sh-note div{margin-top:5px;white-space:pre-wrap}
.sh-acts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.sh-acts .btn{text-align:center;text-decoration:none}
.sh-research{display:flex;gap:10px;flex-wrap:wrap;font-size:12.5px}

/* view transition when swiping between tabs */
.view-in{animation:viewIn .26s cubic-bezier(.32,.72,0,1)}
@keyframes viewIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ===== Market comps (from a gb-listings .txt export) ===== */
const LS_MARKET='gb_market_v1';
let MARKET=null;  // {date, listings:[...], index:{key:{n,med,min,max}}}
// Price history accumulates across every listings file you drop in, so comp coverage
// compounds and each card gets a trend instead of a one-off snapshot.
const LS_MHIST='gb_mhist_v1';
let MHIST={};
function loadMHist(){try{MHIST=JSON.parse(localStorage.getItem(LS_MHIST))||{};}catch(e){MHIST={};}}
function saveMHist(){try{localStorage.setItem(LS_MHIST,JSON.stringify(MHIST));}catch(e){}}
function mergeMarket(idx,date){
  Object.entries(idx).forEach(([k,v])=>{
    const arr=MHIST[k]=MHIST[k]||[];
    const last=arr[arr.length-1];
    if(last&&last.d===date) arr[arr.length-1]=Object.assign({d:date},v);
    else arr.push(Object.assign({d:date},v));
    if(arr.length>24) arr.splice(0,arr.length-24);
  });
  saveMHist();
}
function effIndex(){
  const o={};
  Object.entries(MHIST).forEach(([k,arr])=>{
    if(!arr.length)return;
    const l=arr[arr.length-1], f=arr[0];
    o[k]=Object.assign({},l,{pts:arr.length,first:f.med,
      trend:(arr.length>1&&f.med>0)?(l.med-f.med)/f.med:null,
      series:arr.map(x=>x.med)});
  });
  return o;
}

function mktKey(player,mult,franchise){return gbNorm(player)+'|'+(+mult)+'|'+(franchise?'F':'E');}
function parseListings(text){
  const out=[];
  text.split(/\r?\n/).forEach(line=>{
    if(!line.trim())return;
    const p=line.split(',').map(s=>s.trim());
    if(p.length<9)return;
    const price=parseFloat(p[3]);
    if(!p[0]||isNaN(price))return;
    out.push({player:p[0],mult:parseFloat(p[1])||1,status:(p[2]||'').toLowerCase(),price,
      exp:p[4]||null,pos:(p[5]||'').toUpperCase(),ovr:p[6]?+p[6]:null,id:p[7]||null,team:p[8]||''});
  });
  return out;
}
function buildMarketIndex(listings){
  const g={};
  listings.forEach(l=>{const k=mktKey(l.player,l.mult,l.status==='franchise');(g[k]=g[k]||[]).push(l.price);});
  const idx={};
  const median=a=>{const n=a.length;return n%2?a[(n-1)/2]:(a[n/2-1]+a[n/2])/2;};
  Object.entries(g).forEach(([k,arr])=>{
    arr.sort((a,b)=>a-b);
    // Sellers park cards at absurd asks so they don't sell — trim those so the comp
    // reflects what you'd actually transact at (the realistic floor, not the parked prices).
    const p25=arr[Math.floor(0.25*(arr.length-1))];
    const cap=Math.max(p25*4, arr[0]*2);
    const trimmed=arr.filter(v=>v<=cap);
    const use=trimmed.length>=Math.max(2,Math.ceil(arr.length*0.4))?trimmed:arr;
    idx[k]={n:arr.length,nUsed:use.length,med:+median(use).toFixed(2),
      min:+arr[0].toFixed(2),max:+arr[arr.length-1].toFixed(2)};
  });
  return idx;
}

function snipeList(){
  if(!MARKET)return [];

/* ===== Listing queue: what to list, at what price, and what sold ===== */
const LS_LIST='gb_listing_v1', GB_FEE=0.05;   // GameBlazers takes 5% of the sale
let LISTING={strategy:'balanced',keepPer:2,windowDays:60,minVal:0,batch:20,
  rules:{window:true,dupes:true,avoid:false},marked:{},sold:[]};
// GameBlazers rule: a card expiring in 31 days or less can NOT be listed.
const LIST_MIN_DAYS=31;
const listable=c=>!!c.tr && (!c.exp || c.days>LIST_MIN_DAYS);
function loadListing(){try{const s=JSON.parse(localStorage.getItem(LS_LIST));if(s)LISTING=Object.assign(LISTING,s);}catch(e){}}
function saveListing(){try{localStorage.setItem(LS_LIST,JSON.stringify(LISTING));}catch(e){}}
function qKey(c){return c.id||keyOf(c);}
function suggestPrice(c){
  if(!c.mkt)return null;
  const floor=c.mkt.min, med=c.mkt.med;
  let p = LISTING.strategy==='fast' ? floor*0.97 : LISTING.strategy==='max' ? med : (floor+med)/2;
  return +Math.max(0.5,p).toFixed(2);
}
const netAfterFee=p=>+(p*(1-GB_FEE)).toFixed(2);
function buildQueue(){
  const out=[],seen=new Set(),R=LISTING.rules;
  const add=(c,why)=>{const k=qKey(c);
    if(seen.has(k)||LISTING.marked[k])return;
    if(!listable(c))return;               // not tradeable, or ≤31d to expiry → GB won't allow listing
    seen.add(k);out.push({c,why});};
  // Last chance: still listable now, but about to cross the 31-day line.
  if(R.window)DATA.filter(c=>c.exp&&c.days>LIST_MIN_DAYS&&c.days<=LISTING.windowDays&&c.est>=LISTING.minVal)
    .forEach(c=>add(c,`window closes in ${c.days-LIST_MIN_DAYS}d`));
  if(R.dupes){const g={};DATA.forEach(c=>{(g[c.player]=g[c.player]||[]).push(c);});
    Object.values(g).forEach(arr=>{if(arr.length<=LISTING.keepPer)return;
      [...arr].sort((a,b)=>b.est-a.est).slice(LISTING.keepPer).forEach(c=>add(c,`extra copy (${arr.length} owned)`));});}
  if(R.avoid)DATA.filter(c=>c.verdict==='AVOID').forEach(c=>add(c,'overpriced (Avoid)'));
  // Closing listing windows first, then cards you can actually price, then value.
  const urg=c=>(c.exp&&c.days<=LISTING.windowDays)?0:1;
  out.sort((a,b)=>urg(a.c)-urg(b.c) || (a.c.mkt?0:1)-(b.c.mkt?0:1)
    || ((a.c.exp?a.c.days:1e9)-(b.c.exp?b.c.days:1e9)) || b.c.est-a.c.est);
  return out;
}
// Cards you marked as listed that are gone from the newest export = sold.
function detectSold(newData){
  const present=new Set(newData.map(c=>c.id||keyOf(c)));
  const sold=[];
  Object.keys(LISTING.marked).forEach(k=>{
    if(!present.has(k)){const m=LISTING.marked[k];
      sold.push({...m,key:k,soldAt:new Date().toISOString().slice(0,10)});delete LISTING.marked[k];}});
  if(sold.length){LISTING.sold=(LISTING.sold||[]).concat(sold);saveListing();}
  return sold;
}
function repriceAlerts(){
  const out=[];
  DATA.forEach(c=>{const m=LISTING.marked[qKey(c)];if(!m||!c.mkt)return;
    const sug=suggestPrice(c);if(sug==null)return;
    const d=(m.price-sug)/sug;
    if(Math.abs(d)>=0.15)out.push({c,listed:m.price,sug,d});});
  return out.sort((a,b)=>Math.abs(b.d)-Math.abs(a.d));
}

function validUrl(u){ return typeof u==='string' && /^https?:\/\/\S+\.\S+/.test(u.trim()); }
function urlFor(c){

/* ============== HELPERS ============== */
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const fmt$=n=>'$'+Math.round(n).toLocaleString();
// Notes are free text the user typed — escape before it ever touches innerHTML.
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));

function daysTo(exp){ if(!exp) return Infinity; const d=new Date(exp+'T00:00:00'); return Math.round((d-TODAY)/86400000); }

/* derived metrics */
let MAXSAL=1;
function median(a){ if(!a.length)return 0; const s=[...a].sort((x,y)=>x-y); const m=s.length>>1; return s.length%2?s[m]:(s[m-1]+s[m])/2; }
let PERPOINT=1, EXPMAXDAYS=365;
function enrich(){
  MAXSAL=Math.max(1,...DATA.map(c=>c.sal));
  // fair-value model: $ of salary per "quality point" (overall × multiplier), from rated cards
  PERPOINT = median(DATA.filter(c=>c.ovr>0 && c.sal>0).map(c=>c.sal/(c.ovr*c.mult))) || 1;
  EXPMAXDAYS = Math.max(30, ...DATA.filter(c=>c.exp).map(c=>daysTo(c.exp)).filter(d=>d>=0));
  DATA.forEach(c=>{
    c.est = c.sal*c.mult;                       // est. payout value
    c.salN=c.sal/MAXSAL*100;
    c.ovN = c.ovr/150*100;
    c.mtN = (c.mult-1)/0.5*100;
    c.blend = +(0.6*c.salN + 0.3*c.ovN + 0.1*c.mtN).toFixed(1); // 0-100
    c.days = daysTo(c.exp);
    c.tier = c.blend>=65?'Elite':c.blend>=45?'High':c.blend>=25?'Mid':'Low';
    valuation(c);               // sets c.fair, c.edge, c.verdict, c.conf
    computeForm(c);             // sets c.form (recent hot/cold) + c.formScore
    projectCard(c);             // sets c.proj (weekly projected pts) + c.projVal (×multiplier)
    c.mkt = (MARKET&&MARKET.index) ? (MARKET.index[mktKey(c.player,c.mult,c.fr)]||null) : null;  // live market comp
    c.sig = signal(c);
    c.url = urlFor(c);          // verified deep link or null
    c.linked = !!c.url;
  });
}
// Edge = how under/over-priced a card is vs its quality-implied fair salary.
function valuation(c){
  if(c.ovr>0 && c.sal>0){
    c.fair = c.ovr*c.mult*PERPOINT;
    c.edge = (c.fair - c.sal)/c.sal;            // +ve = underpriced (good buy)
    c.edgePct = +(c.edge*100).toFixed(1);
    c.conf = (c.ovr>=60)?'High':(c.ovr>=25?'Med':'Low');
  } else {
    c.fair=null; c.edge=null; c.edgePct=null; c.conf='Low'; // unrated (overall 0)
  }
  // verdict (4-tier). Expiration tempers buying conviction on owned cards.
  if(c.edge==null){ c.verdict='FAIR'; }
  else if(c.edge>=0.15){ c.verdict=(c.exp&&c.days>=0&&c.days<=7)?'WATCH':'BUY'; }
  else if(c.edge>=0.03){ c.verdict='WATCH'; }
  else if(c.edge>-0.12){ c.verdict='FAIR'; }
  else { c.verdict='AVOID'; }
}
// Recent form (last 5 games scoring + percentile) → hot/cold tag + trend.
function computeForm(c){
  const a=(c.l5||[]).filter(x=>!isNaN(x));
  let p=(c.l5p||[]).filter(x=>!isNaN(x));
  // GameBlazers sends percentiles as 0–1; normalise to 0–100 so the thresholds work.
  if(p.length && Math.max.apply(null,p)<=1) p=p.map(x=>x*100);
  if(!a.length || a.every(x=>x===0)){ c.form=null; c.formScore=-1; return; }
  const mean=arr=>arr.reduce((s,x)=>s+x,0)/arr.length;
  const pts=mean(a), pct=p.length?mean(p):null;
  const early=mean(a.slice(0,Math.max(1,a.length-2))), late=mean(a.slice(-2));
  const dir=(late>early*1.15&&late-early>=1)?'up':(late<early*0.85&&early-late>=1)?'down':'flat';
  const tag=pct!=null?(pct>=65?'Hot':pct<=35?'Cold':'Steady'):(dir==='up'?'Rising':dir==='down'?'Falling':'Steady');
  c.form={pts:+pts.toFixed(1),pct:pct==null?null:Math.round(pct),dir,tag,series:a};
  c.formScore=pct!=null?pct:Math.min(100,pts*4);
}
// Weekly projection from recent scoring (recent games weighted heavier). ×multiplier = payout-weighted projection.
function projectCard(c){
  const a=(c.l5||[]).filter(x=>!isNaN(x));
  if(a.length){ const w=[1,1,2,3,4].slice(-a.length); const tw=w.reduce((s,x)=>s+x,0);
    c.proj=+(a.slice(-w.length).reduce((s,v,i)=>s+v*w[i],0)/tw).toFixed(1);
    c.projVal=+(c.proj*c.mult).toFixed(1); }
  else { c.proj=null; c.projVal=null; }
}
function formBadge(c){
  if(!c.form)return '<span class="muted">—</span>';
  const f=c.form, ic={Hot:'🔥',Cold:'❄️',Rising:'📈',Falling:'📉',Steady:'➖'}[f.tag]||'';
  const cls={Hot:'fm-hot',Cold:'fm-cold',Rising:'fm-up',Falling:'fm-down',Steady:'fm-mid'}[f.tag]||'fm-mid';
  const dir=f.dir==='up'?' ↗':f.dir==='down'?' ↘':'';
  const mx=Math.max(1,...f.series);
  const spark=`<span class="spark5">${f.series.map(v=>`<i style="height:${Math.max(8,v/mx*100)}%"></i>`).join('')}</span>`;
  return `<span class="fmtag ${cls}" title="Last 5: ${f.series.join(', ')} pts${f.pct!=null?' · '+f.pct+'th pctile':''}">${ic} ${f.tag}${dir}</span>${spark}`;
}
function signal(c){
  const prev = prevValue(c);
  let move=null;
  if(prev!=null && prev>0){ const ch=(c.est-prev)/prev; if(ch>=.12) move='up'; else if(ch<=-.12) move='down'; }
  if(c.fr) return {s:'HOLD',r:'Franchise core asset — never expires',m:move};
  if(c.days<=7 && c.exp) return {s:'SELL',r:`Expires in ${c.days<0?'—':c.days+'d'} — list or use now`,m:move};
  if(c.days<=21 && c.blend>=50 && c.exp) return {s:'SELL',r:`High value & expiring in ${c.days}d — cash out`,m:move};
  if(move==='down' && c.blend>=40) return {s:'SELL',r:'Value sliding vs last snapshot — sell into strength',m:move};
  if(c.blend>=65) return {s:'HOLD',r:'Premium asset — plenty of runway',m:move};
  if(move==='up') return {s:'BUY',r:'Value rising vs last snapshot — accumulate',m:move};
  if(c.ovr>=80 && c.tier!=='Elite') return {s:'BUY',r:`Strong performer (OVR ${c.ovr}) priced below tier`,m:move};
  return {s:'HOLD',r:'Stable — monitor',m:move};
}
function keyOf(c){return [c.player,c.pos,c.team,c.col,c.mult,c.exp].join('|');}
let PREVMAP=null;
function prevValue(c){ if(!PREVMAP) return null; return PREVMAP[keyOf(c)] ?? null; }
// price series across all saved snapshots (for trend/sparkline)
function priceSeries(c){const k=keyOf(c);return HISTORY.map(h=>h.map&&h.map[k]).filter(v=>v!=null);}
function priceTrend(c){const s=priceSeries(c);if(s.length<2)return null;const a=s[Math.max(0,s.length-4)],b=s[s.length-1];return a>0?(b-a)/a:null;}
function sparkline(s,w){if(!s||s.length<2)return '';const mx=Math.max(...s),mn=Math.min(...s),rng=mx-mn||1;return '<span class="spark5" style="width:'+(w||44)+'px">'+s.slice(-8).map(v=>'<i style="height:'+(15+(v-mn)/rng*85)+'%"></i>').join('')+'</span>';}

/* ================================================================
   TARGETS · NOTES · COMPARE  —  state layer
   Targets are cards you want to BUY, so they're keyed by identity
   (player+multiplier+collection), not by an itemId you don't own yet.
   Notes attach to cards you DO own, so they key off the itemId when
   there is one and fall back to card identity when there isn't.
   ================================================================ */
const LS_TARGETS='gb_targets_v1', LS_NOTES='gb_notes_v1';
let TARGETS=[], NOTES={}, CMP=[];          // CMP is session-only by design

function loadTargets(){ try{TARGETS=JSON.parse(localStorage.getItem(LS_TARGETS))||[];}catch(e){TARGETS=[];} }

const noteKey=c=>c.id||keyOf(c);
/* Keyed on player + multiplier only. Collection is often blank when you add a
   target by typing a name, so including it would let near-duplicates through. */
const tgtKey =t=>gbNorm(t.player)+'|'+(+t.mult);

function setNote(c,txt){
  const k=noteKey(c);
  if(txt&&txt.trim()) NOTES[k]={t:txt.trim(),p:c.player,d:new Date().toISOString().slice(0,10)};

/* Live market read for a target: same comp engine the inventory uses. */
function targetMarket(t){
  if(!MARKET||!MARKET.index) return null;
  return MARKET.index[mktKey(t.player,t.mult,!!t.fr)]||null;
}
/* A target "hits" when the market median has fallen to or below your max. */
function targetStatus(t){
  const m=targetMarket(t);
  if(t.bought) return {code:'bought',label:'Acquired',m};
  if(!m||!m.n)  return {code:'nodata',label:'No comps yet',m};
  if(m.min!=null && t.max!=null && m.min<=t.max) return {code:'hit',label:'In range now',m};
  if(m.med!=null && t.max!=null){
    const off=(m.med-t.max)/t.max;
    if(off<=0)   return {code:'hit',  label:'In range now',m};
    if(off<=0.2) return {code:'close',label:`${Math.round(off*100)}% over`,m};
    return {code:'far',label:`${Math.round(off*100)}% over`,m};
  }
  return {code:'nodata',label:'Set a max price',m};
}
function addTarget(o){
  const t=Object.assign({player:'',mult:1,col:'',pos:'',team:'',fr:false,max:null,note:'',bought:false,
                         added:new Date().toISOString().slice(0,10)},o);
  if(!t.player) return false;
  if(TARGETS.some(x=>tgtKey(x)===tgtKey(t))) return false;   // no duplicates
  TARGETS.push(t); saveTargets(); return true;
}
function removeTarget(i){ TARGETS.splice(i,1); saveTargets(); }
/* Targets whose market has come to you — surfaced on the Dashboard and in Act Now. */
function targetHits(){ return TARGETS.filter(t=>!t.bought && targetStatus(t).code==='hit'); }
function snapshot(tag){
  enrich();
  const today=new Date().toISOString().slice(0,10);
  const map={}; DATA.forEach(c=>{map[keyOf(c)]=c.est;});
  const byPos={}; DATA.forEach(c=>byPos[c.pos]=(byPos[c.pos]||0)+c.est);
  const snap={date:today,total:DATA.reduce((s,c)=>s+c.est,0),count:DATA.length,byPos,map};
  // replace same-day snapshot, else push
  const i=HISTORY.findIndex(h=>h.date===today);
  if(i>=0) HISTORY[i]=snap; else HISTORY.push(snap);
  HISTORY=HISTORY.slice(-30);
  localStorage.setItem(LS_HIST,JSON.stringify(HISTORY));
  localStorage.setItem(LS_DATA,JSON.stringify(DATA.map(({player,pos,team,mult,ovr,fr,rk,tr,sal,col,st,exp,id,l5,l5p})=>({player,pos,team,mult,ovr,fr,rk,tr,sal,col,st,exp,id,l5,l5p}))));
}

// bulk import: CSV with a URL column + any identifying columns (Player/Team/Multiplier/Collection/Expires).
// Matches each row to cards by every identifying field present; assigns only on a UNIQUE match, flags the rest.
function importLinks(text){
  const rows=[];let i=0,f='',row=[],q=false;text=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  while(i<text.length){const ch=text[i];if(q){if(ch=='"'){if(text[i+1]=='"'){f+='"';i++;}else q=false;}else f+=ch;}else{if(ch=='"')q=true;else if(ch==','){row.push(f);f='';}else if(ch=='\n'){row.push(f);rows.push(row);row=[];f='';}else f+=ch;}i++;}
  if(f.length||row.length){row.push(f);rows.push(row);}
  if(rows.length<2){toast('Mapping file looks empty.');return;}
  const head=rows.shift().map(h=>h.trim());
  const col=names=>{for(const n of names){const x=head.findIndex(h=>h.toLowerCase()===n.toLowerCase());if(x>=0)return x;}return -1;};
  const ci={url:col(['Url','URL','Link','ListingUrl','MarketplaceUrl','CardUrl','ItemUrl']),player:col(['Player']),team:col(['Team']),mult:col(['Multiplier']),coln:col(['Collection']),exp:col(['Expires']),id:col(['ListingId','ItemId','CardId','Id'])};
  if(ci.url<0){toast('No URL/Link column found in that file.');return;}
  let ok=0,amb=0,none=0;
  for(const r of rows){ if(r.length<=ci.url) continue; const url=(r[ci.url]||'').trim(); if(!validUrl(url)) continue;
    // build candidate filter from provided identifying fields
    const want={};
    if(ci.player>=0&&r[ci.player]) want.player=r[ci.player].trim();
    if(ci.team>=0&&r[ci.team]) want.team=r[ci.team].trim();
    if(ci.mult>=0&&r[ci.mult]) want.mult=parseFloat(r[ci.mult]);
    if(ci.coln>=0&&r[ci.coln]) want.col=r[ci.coln].trim();
    if(ci.exp>=0&&r[ci.exp]) { const e=r[ci.exp].trim(); want.exp=(e==='N/A'||!e)?null:e; }
    let matches;
    if(ci.id>=0&&r[ci.id]){ const id=r[ci.id].trim(); matches=DATA.filter(c=>c.id===id); }
    else matches=DATA.filter(c=>Object.entries(want).every(([k,v])=>c[k]===v));
    if(matches.length===1){ LINKS[matches[0].id||keyOf(matches[0])]=url; ok++; }

/* ===== Marketplace screenshot scanner (client-side OCR) ===== */
function ensureTesseract(){return window.Tesseract?Promise.resolve():new Promise((res,rej)=>{const sc=document.createElement('script');sc.src='https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.1/tesseract.min.js';sc.onload=res;sc.onerror=()=>rej(new Error('Could not load the OCR engine — an internet connection is needed the first time you scan.'));document.head.appendChild(sc);});}
async function ocrImage(file,onProg){await ensureTesseract();const{data}=await Tesseract.recognize(file,'eng',{logger:m=>{if(m.status==='recognizing text'&&onProg)onProg(Math.round(m.progress*100));}});return data.text||'';}
function detectListings(text){
  const S=text.toLowerCase().replace(/[^a-z0-9. ]/g,' ').replace(/\s+/g,' ');
  const SN=S.replace(/\./g,' ');                                                // dots→space (same length) so names align with multiplier offsets
  const words=[];{let off=0;for(const w of SN.split(' ')){words.push({w,at:off});off+=w.length+1;}}
  const wpos=(tok,near,win)=>{let best=-1,bd=1e9;for(const o of words){const eq=o.w===tok||(tok.length>=5&&o.w.length>=5&&Math.abs(o.w.length-tok.length)<=2&&gbLev(o.w,tok)<=1);if(!eq)continue;if(near==null){if(best<0)best=o.at;continue;}const d=Math.abs(o.at-near);if(d<bd){bd=d;best=o.at;}}return near==null?best:(best>=0&&bd<=win?best:-1);};
  const mults=[];let m;const re=/(1(?:\.[0-5])?|\.[0-9])\s*x/g;
  while(m=re.exec(S)){let v=parseFloat(m[1]);if(v>=1&&v<=1.5)mults.push({v:Math.round(v*10)/10,at:m.index});}
  const colHits=[];[...new Set(DATA.map(c=>c.col))].forEach(cn=>{const n=gbNorm(cn);if(n.length<4)return;let i=S.indexOf(n);while(i>=0){colHits.push({col:cn,at:i});i=S.indexOf(n,i+n.length);}});
  const players=[...new Set(DATA.map(c=>c.player))];const found=[];
  for(const p of players){const raw=gbNorm(p).split(' ').filter(Boolean);if(!raw.length)continue;
    const last=raw[raw.length-1];if(last.length<3)continue;const li=wpos(last,null);if(li<0)continue;
    if(raw.length>=2&&wpos(raw[0],li,55)<0)continue;
    found.push({player:p,at:li});}
  const seen={};const listings=found.filter(f=>{if(seen[f.player])return false;seen[f.player]=1;return true;}).sort((a,b)=>a.at-b.at);
  const nearest=(arr,at,win)=>{let best=null,bd=1e9;for(const o of arr){const d=Math.abs(o.at-at);if(d<bd){bd=d;best=o;}}return(best&&bd<win)?best:null;};
  listings.forEach(l=>{const mm=nearest(mults,l.at,120);l.mult=mm?mm.v:null;const cc=nearest(colHits,l.at,120);l.col=cc?cc.col:null;});
  return listings;
}
function scanMatches(listings){return listings.map(l=>{
  const all=DATA.filter(c=>gbNorm(c.player)===gbNorm(l.player));
  let exact=null;
  if(l.mult!=null){let cand=all.filter(c=>Math.abs(c.mult-l.mult)<0.05);if(l.col){const cc=cand.filter(c=>c.col===l.col);if(cc.length)cand=cc;}exact=cand.slice().sort((a,b)=>b.est-a.est)[0]||null;}
  const variants={};all.forEach(c=>{(variants[c.mult]=variants[c.mult]||{mult:c.mult,cards:[]}).cards.push(c);});
  const vlist=Object.values(variants).sort((a,b)=>b.mult-a.mult).map(v=>{const best=v.cards.slice().sort((a,b)=>b.est-a.est)[0];return{mult:v.mult,count:v.cards.length,best,match:l.mult!=null&&Math.abs(v.mult-l.mult)<0.05};});
  return{player:l.player,detMult:l.mult,detCol:l.col,exact,variants:vlist};});}

/* ============== CSV PARSER (offline, quote-aware) ============== */
function parseCSV(text){
  const rows=[];let i=0,f='',row=[],q=false;
  text=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  while(i<text.length){const ch=text[i];
    if(q){ if(ch=='"'){ if(text[i+1]=='"'){f+='"';i++;} else q=false;} else f+=ch; }
    else{ if(ch=='"')q=true; else if(ch==','){row.push(f);f='';} else if(ch=='\n'){row.push(f);rows.push(row);row=[];f='';} else f+=ch; }
    i++;
  }
  if(f.length||row.length){row.push(f);rows.push(row);}
  const head=rows.shift().map(h=>h.trim());
  const idx=n=>head.indexOf(n);
  const idxAny=names=>{for(const n of names){const i=head.findIndex(h=>h.toLowerCase()===n.toLowerCase());if(i>=0)return i;}return -1;};
  const uCol=idxAny(['Url','URL','Link','ListingUrl','ListingURL','MarketplaceUrl','MarketplaceURL','CardUrl','ItemUrl']);
  const iCol=idxAny(['ListingId','ListingID','ItemId','ItemID','CardId','CardID','Id','ID','itemId']);
  const l5Col=idxAny(['Last5','Last5Scoring','RecentScoring']);
  const l5pCol=idxAny(['Last5Pct','Last5Percentile','RecentPercentile']);
  const get=(r,i)=>i>=0&&i<r.length?r[i].trim():'';
  const nums=s=>s?s.split(/[|,;]/).map(x=>parseFloat(x)).filter(x=>!isNaN(x)):[];
  const out=[];
  for(const r of rows){ if(r.length<head.length||(r.length===1&&r[0]==='')) continue;
    const c={
      player:r[idx('Player')].trim(),pos:r[idx('Positions')].trim(),team:r[idx('Team')].trim(),
      mult:parseFloat(r[idx('Multiplier')])||1,ovr:parseInt(r[idx('Overall')])||0,
      fr:r[idx('Franchise')].trim()==='Yes',rk:r[idx('Rookie')].trim()==='Yes',tr:r[idx('Tradeable')].trim()==='Yes',
      sal:parseInt(r[idx('Salary')])||0,col:r[idx('Collection')].trim(),st:r[idx('Status')].trim(),
      exp:(r[idx('Expires')].trim()==='N/A'||!r[idx('Expires')].trim())?null:r[idx('Expires')].trim()
    };
    const id=get(r,iCol); if(id) c.id=id;
    const l5=nums(get(r,l5Col)); if(l5.length) c.l5=l5;
    const l5p=nums(get(r,l5pCol)); if(l5p.length) c.l5p=l5p;
    c._url=get(r,uCol); // captured for ingest to fold into LINKS
    out.push(c);
  }
  out._hadUrlCol=uCol>=0; out._hadIdCol=iCol>=0;
  return out;
}
function ingest(text){
  const parsed=parseCSV(text);
  if(!parsed.length){toast('No rows found in that CSV.');return;}
  // fold any URLs supplied in the export into the persistent link map
  let added=0;
  parsed.forEach(c=>{ const u=(c._url||'').trim();
    // Skip stale GameBlazers routes (old ?itemId= form). We rebuild those from the id
    // via gbLinkFor(), so importing an older export can't downgrade good links.
    if(validUrl(u) && !isStaleGbUrl(u)){ LINKS[c.id||keyOf(c)]=u; added++; }
    delete c._url; });
  const healed=healLinks();
  if(added||healed) saveLinks();
  if(healed) setTimeout(()=>toast(`🔗 Upgraded ${healed} link${healed===1?'':'s'} to the current GameBlazers route.`),1400);
  const soldNow=detectSold(parsed);   // anything you marked listed that's now gone = sold
  DATA=parsed; SRC={kind:'upload',date:new Date().toISOString().slice(0,10),n:parsed.length};
  try{localStorage.setItem(LS_SRC,JSON.stringify(SRC));}catch(e){}
  snapshot('upload'); setPrevMap(); renderAll();
  if(soldNow.length) setTimeout(()=>toast(`💰 ${soldNow.length} listed card${soldNow.length===1?'':'s'} sold — see the Listing tab.`),2800);
  const miss=DATA.filter(c=>!c.linked).length;
  toast(`Loaded ${parsed.length} cards.${added?` Imported ${added} listing links from the file.`:''} ${miss} still need a GameBlazers link.`);
}

let invState={sort:'est',dir:-1,page:0,per:50,q:'',pos:'',team:'',col:'',st:'',tier:'',quick:'',nl:null,nlText:'',
  conf:'',type:'',verdict:'',mults:[],priceMin:'',priceMax:'',ovrMin:'',ovrMax:'',expLo:null,expHi:null};
function expActive(){return invState.expLo!=null && (invState.expLo>0 || invState.expHi<EXPMAXDAYS);}
function fmtDay(off){const d=new Date(TODAY.getTime()+off*86400000);return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'});}
function cardType(c){ if(c.fr)return'Franchise'; const k=(c.col||'').toLowerCase(); if(k.includes('primetime'))return'Primetime'; if(k.includes('core'))return'Core'; return'Other'; }
/* fuzzy player search: case-insensitive, partial, typo-tolerant, any word order */
function gbNorm(s){return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();}
function gbLev(a,b){const m=a.length,n=b.length;if(Math.abs(m-n)>2)return 3;let dp=[];for(let i=0;i<=m;i++)dp[i]=i;for(let j=1;j<=n;j++){let prev=dp[0];dp[0]=j;for(let i=1;i<=m;i++){const t=dp[i];dp[i]=Math.min(dp[i]+1,dp[i-1]+1,prev+(a[i-1]===b[j-1]?0:1));prev=t;}}return dp[m];}
function gbTok(qt,ft){if(!ft)return false;if(ft.includes(qt))return true;if(qt.length>=4){const thr=qt.length>=7?2:1;if(gbLev(qt,ft)<=thr)return true;if(ft.length>=qt.length&&gbLev(qt,ft.slice(0,qt.length))<=thr)return true;}return false;}
function playerMatch(query,c){const q=gbNorm(query);if(!q)return true;const sq=gbNorm(c.player).replace(/ /g,'');if(sq.includes(q.replace(/ /g,'')))return true;const hay=gbNorm(c.player+' '+c.team+' '+c.col);const fields=gbNorm(c.player).split(' ').concat([gbNorm(c.team),gbNorm(c.pos),gbNorm(c.col)]);return q.split(' ').every(qt=>hay.includes(qt)||fields.some(ft=>gbTok(qt,ft)));}

function gbHighlight(c){try{window.postMessage({source:'gb-ev-terminal',name:c.player,multiplier:(c.mult||1)+'x'},'*');toast('Sent “'+c.player+' ×'+c.mult+'” to GameBlazers — check your browser (needs the GB extension).');}catch(e){}}
function invFiltered(){
  const nl=invState.nl, IS=invState;
  let r=DATA.filter(c=>{
    if(IS.q&&!playerMatch(IS.q,c))return false;
    if(IS.pos&&c.pos!==IS.pos)return false;
    if(IS.team&&c.team!==IS.team)return false;
    if(IS.col&&c.col!==IS.col)return false;
    if(IS.st&&c.st!==IS.st)return false;
    if(IS.tier&&c.tier!==IS.tier)return false;
    if(IS.conf&&c.conf!==IS.conf)return false;
    if(IS.verdict&&c.verdict!==IS.verdict)return false;
    if(IS.type&&cardType(c)!==IS.type)return false;
    if(IS.mults.length&&!IS.mults.includes(c.mult))return false;
    if(IS.priceMin!==''&&c.sal<+IS.priceMin)return false;
    if(IS.priceMax!==''&&c.sal>+IS.priceMax)return false;
    if(IS.ovrMin!==''&&c.ovr<+IS.ovrMin)return false;
    if(IS.ovrMax!==''&&c.ovr>+IS.ovrMax)return false;
    if(expActive()){ if(!(c.exp&&c.days>=0&&c.days>=IS.expLo&&c.days<=IS.expHi))return false; }
    if(IS.quick==='exp'&&!(c.exp&&c.days>=0&&c.days<=30))return false;
    if(IS.quick==='fr'&&!c.fr)return false;
    if(IS.quick==='sell'&&c.sig.s!=='SELL')return false;
    if(IS.quick==='buy'&&c.sig.s!=='BUY')return false;
    if(IS.quick==='listed'&&c.st!=='Listed')return false;
    if(IS.quick==='tradeable'&&!c.tr)return false;
    if(IS.quick==='nolink'&&c.linked)return false;
    if(IS.quick==='hot'&&!(c.form&&(c.form.tag==='Hot'||c.form.tag==='Rising')))return false;
    if(IS.quick==='cold'&&!(c.form&&(c.form.tag==='Cold'||c.form.tag==='Falling')))return false;
    if(nl&&nl.preds.length&&!nl.preds.every(p=>p(c)))return false;
    return true;
  });
  const s=(nl&&nl.sort)||invState.sort, d=(nl&&nl.sort)?nl.dir:invState.dir;
  r.sort((a,b)=>{let x=a[s],y=b[s];
    if(s==='days'){x=a.exp?a.days:1e9;y=b.exp?b.days:1e9;}
    if(s==='edge'){x=a.edge==null?-1e9:a.edge;y=b.edge==null?-1e9:b.edge;}
    if(s==='form'){x=a.formScore==null?-1:a.formScore;y=b.formScore==null?-1:b.formScore;}
    if(typeof x==='string')return d*x.localeCompare(y);return d*((x>y)-(x<y));});
  if(nl&&nl.limit) r=r.slice(0,nl.limit);
  return r;
}

/* ============== NATURAL-LANGUAGE QUERY PARSER ============== */
const MONTHS={january:1,february:2,march:3,april:4,may:5,june:6,july:7,august:8,september:9,october:10,november:11,december:12,jan:1,feb:2,mar:3,apr:4,jun:6,jul:7,aug:8,sep:9,sept:9,oct:10,nov:11,dec:12};
const POSWORDS={qb:'Qb',quarterback:'Qb',quarterbacks:'Qb',rb:'Rb','running back':'Rb','running backs':'Rb',runningback:'Rb',wr:'Wr',receiver:'Wr',receivers:'Wr','wide receiver':'Wr','wide receivers':'Wr',wideout:'Wr',wideouts:'Wr',te:'Te','tight end':'Te','tight ends':'Te',tightend:'Te'};
const pad=n=>String(n).padStart(2,'0');
function yearFor(mo){ const tm=TODAY.getMonth()+1; return mo>=tm? TODAY.getFullYear() : TODAY.getFullYear()+1; } // schedule-aware default
function isoFromMD(mo,day,yr){ return `${yr||yearFor(mo)}-${pad(mo)}-${pad(day)}`; }
function endOfMonthISO(yr,mo){ const d=new Date(yr,mo,0).getDate(); return `${yr}-${pad(mo)}-${pad(d)}`; }
// find a date in a phrase; returns {iso} or null
function findDate(t){
  let m;
  // 2026-07-29
  if(m=t.match(/(\d{4})-(\d{1,2})-(\d{1,2})/)) return {iso:`${m[1]}-${pad(+m[2])}-${pad(+m[3])}`};
  // 7/29 or 7/29/2026
  if(m=t.match(/\b(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?\b/)){let yr=m[3]?(+m[3]<100?2000+ +m[3]:+m[3]):null; return {iso:isoFromMD(+m[1],+m[2],yr)};}
  // July 29th / July 29, 2026 / 29 July
  const mn=Object.keys(MONTHS).join('|');
  if(m=t.match(new RegExp(`\\b(${mn})\\b\\.?\\s+(\\d{1,2})(?:st|nd|rd|th)?(?:,?\\s*(\\d{4}))?`,'i'))) return {iso:isoFromMD(MONTHS[m[1].toLowerCase()],+m[2],m[3]?+m[3]:null)};
  if(m=t.match(new RegExp(`\\b(\\d{1,2})(?:st|nd|rd|th)?\\s+(${mn})\\b`,'i'))) return {iso:isoFromMD(MONTHS[m[2].toLowerCase()],+m[1],null)};
  return null;
}
function parseMoney(s){ s=s.replace(/[$,\s]/g,'').toLowerCase(); let n=parseFloat(s); if(/k$/.test(s))n*=1e3; if(/m$/.test(s))n*=1e6; return isNaN(n)?null:n; }
function parseNL(raw){
  if(!raw||!raw.trim()) return null;
  const t=raw.toLowerCase(), preds=[], label=[]; let sort=null,dir=-1,limit=null;
  // position
  for(const w of Object.keys(POSWORDS).sort((a,b)=>b.length-a.length)){ if(new RegExp(`\\b${w}\\b`).test(t)){const p=POSWORDS[w];preds.push(c=>c.pos===p);label.push(p.toUpperCase());break;} }
  // flags
  if(/\bfranchise\b/.test(t)){preds.push(c=>c.fr);label.push('Franchise');}
  if(/\btradeable\b|\btradable\b/.test(t)){preds.push(c=>c.tr);label.push('Tradeable');}
  if(/\blisted\b|\bon (the )?market\b|\bfor sale\b/.test(t)){preds.push(c=>c.st==='Listed');label.push('Listed');}
  else if(/\bactive\b/.test(t)){preds.push(c=>c.st==='Active');label.push('Active');}
  if(/\brookie\b/.test(t)){preds.push(c=>c.rk);label.push('Rookie');}
  if(/\bunlinked\b|\bnot linked\b|\bbroken link\b|\b(missing|no|without|needs?|needing)\b\s*(a\s*|an\s*|the\s*)?(gb\s*|gameblazers\s*)?(link|url|listing)/.test(t)){preds.push(c=>!c.linked);label.push('missing link');}
  else if(/\b(is\s+)?linked\b|\bhas\b\s*(a\s*|an\s*)?(gb\s*)?(link|url)\b|\bwith\b\s*(a\s*)?(link|url)\b|\bmapped\b/.test(t)){preds.push(c=>c.linked);label.push('has link');}
  // tier / signal words
  if(/\belite\b/.test(t)){preds.push(c=>c.tier==='Elite');label.push('Elite tier');}
  if(/\bshould (i )?sell\b|\bsell signal\b|\bsell candidates?\b/.test(t)){preds.push(c=>c.sig.s==='SELL');label.push('Sell signal');}
  if(/\bshould (i )?buy\b|\bbuy signal\b|\bbuy candidates?\b|\baccumulate\b/.test(t)){preds.push(c=>c.sig.s==='BUY');label.push('Buy signal');}
  // team (match codes present in data, e.g. KC, BAL)
  const teams=[...new Set(DATA.map(c=>c.team))];
  for(const tm of teams){ if(new RegExp(`\\b${tm.toLowerCase()}\\b`).test(t)){preds.push(c=>c.team===tm);label.push(tm);break;} }
  // value thresholds
  let m;
  if(m=t.match(/(?:value|worth|salary|priced?)\s*(?:of\s*)?(?:over|above|more than|greater than|at least|>=|>)\s*\$?([\d.,]+\s*[km]?)/)){const v=parseMoney(m[1]);if(v!=null){preds.push(c=>c.est>=v);label.push('value ≥ '+fmtK(v));}}
  if(m=t.match(/(?:value|worth|salary|priced?)\s*(?:of\s*)?(?:under|below|less than|cheaper than|<=|<)\s*\$?([\d.,]+\s*[km]?)/)){const v=parseMoney(m[1]);if(v!=null){preds.push(c=>c.est<=v);label.push('value ≤ '+fmtK(v));}}
  if(m=t.match(/\bovr?\s*(?:over|above|>=|>|of at least)?\s*(\d{1,3})\b/)||(m=t.match(/\boverall\s*(?:over|above|>=|>|of at least)?\s*(\d{1,3})\b/))){ if(/over|above|>|least/.test(t)){const v=+m[1];preds.push(c=>c.ovr>=v);label.push('OVR ≥ '+v);} }
  // sort by value
  if(/\b(highest|most valuable|top|best|biggest|priciest|expensive)\b/.test(t)){sort='est';dir=-1;label.push('value high→low');}
  else if(/\b(lowest|cheapest|least valuable|worst)\b/.test(t)){sort='est';dir=1;label.push('value low→high');}
  if(/\bexpiring soon(est)?\b|\bclosest to expir/.test(t)){sort='days';dir=1;label.push('soonest expiry');}
  // top N / limit
  if(m=t.match(/\b(?:top|first|highest|best)\s+(\d{1,3})\b/)){limit=+m[1];if(!sort){sort='est';dir=-1;}label.push('top '+limit);}
  // ===== EXPIRATION CONDITIONS =====
  const hasExpWord=/\bexpir|\bexpires?\b|\bexpiry\b|\bexpiration\b/.test(t);
  if(/\bnever expir|\bdon'?t expire|\bno expir/.test(t)){preds.push(c=>!c.exp);label.push('never expires');}
  else if(/\bexpired\b/.test(t)){preds.push(c=>c.exp&&c.days<0);label.push('already expired');}
  else if(/\bbetween\b/.test(t)){
    // between DATE and DATE
    const parts=t.split(/\band\b/); const d1=findDate(parts[0]||''),d2=findDate(parts[1]||'');
    if(d1&&d2){preds.push(c=>c.exp&&c.exp>=d1.iso&&c.exp<=d2.iso);label.push(`expires ${d1.iso} → ${d2.iso}`);}
  }
  else {
    const after=/\b(or later|onwards?|after|from|later than|on or after|starting)\b/.test(t);
    const before=/\b(or (?:earlier|sooner)|before|by|up to|no later than|earlier than|on or before|prior to|until)\b/.test(t);
    const d=findDate(t);
    if(d && after){preds.push(c=>c.exp&&c.exp>=d.iso);label.push('expires ≥ '+d.iso);}
    else if(d && before){preds.push(c=>c.exp&&c.exp<=d.iso);label.push('expires ≤ '+d.iso);}
    else if(d && hasExpWord){preds.push(c=>c.exp===d.iso);label.push('expires on '+d.iso);}
    else if(/\bthis week\b|\bnext 7 days\b|\bwithin (a|1) week\b/.test(t)){preds.push(c=>c.exp&&c.days>=0&&c.days<=7);label.push('expires ≤7d');}
    else if(/\bthis month\b/.test(t)){let ey=TODAY.getFullYear(),em=TODAY.getMonth()+1; if(TODAY.getDate()>=25){if(em>=12){em=1;ey++;}else em++;} const e=endOfMonthISO(ey,em);const tISO=`${TODAY.getFullYear()}-${pad(TODAY.getMonth()+1)}-${pad(TODAY.getDate())}`;preds.push(c=>c.exp&&c.exp>=tISO&&c.exp<=e);label.push('expires this month (through '+e+')');}
    else if(/\bnext month\b/.test(t)){const ny=TODAY.getMonth()+1>=12?TODAY.getFullYear()+1:TODAY.getFullYear();const nm=(TODAY.getMonth()+1)%12+1;const s=`${ny}-${pad(nm)}-01`,e=endOfMonthISO(ny,nm);preds.push(c=>c.exp&&c.exp>=s&&c.exp<=e);label.push('expires next month');}
    else if(m=t.match(/\b(?:next|within|in)\s+(\d{1,3})\s+days?\b/)){const n=+m[1];preds.push(c=>c.exp&&c.days>=0&&c.days<=n);label.push(`expires ≤${n}d`);}
    else if(/\bexpiring soon\b/.test(t)){preds.push(c=>c.exp&&c.days>=0&&c.days<=14);label.push('expires ≤14d');}
    else if(hasExpWord && !sort){preds.push(c=>c.exp&&c.days>=0);label.push('has expiration');sort='days';dir=1;}
  }
  // player name (full-name contains) — only if nothing else strongly matched
  if(!preds.length){ const pl=[...new Set(DATA.map(c=>c.player))].find(p=>t.includes(p.toLowerCase())); if(pl){preds.push(c=>c.player===pl);label.push(pl);} }
  if(!preds.length && !sort) return {preds:[],sort:null,dir:-1,limit:null,label:[],unmatched:true};
  return {preds,sort,dir,limit,label,unmatched:false};
}

        <span class="flbl">Expiration window — <b id="expLabel" style="color:var(--txt)">${expActive()?`${fmtDay(elo)} → ${fmtDay(ehi)} · ${elo}–${ehi}d`:'all dates'}</b></span>
        <div class="dual" id="expDual">
          <div class="dual-track"><div class="dual-fill" id="expFill"></div></div>
          <input type="range" id="expLoR" min="0" max="${EXPMAXDAYS}" step="1" value="${elo}">
          <input type="range" id="expHiR" min="0" max="${EXPMAXDAYS}" step="1" value="${ehi}">
        </div>
        <div class="exppresets">${[['30','Next 30d'],['90','Next 90d'],['180','Next 180d'],['365','Next 12mo'],['all','All dates']].map(([k,l])=>`<span class="chip exppreset" data-p="${k}">${l}</span>`).join('')}</div>
      </div>
    </div>
    <div class="frow verdrow">
      <div class="verdicts">${[['BUY','Buys'],['WATCH','Watch'],['FAIR','Fair'],['AVOID','Avoid'],['','All verdicts']].map(([v,l])=>`<span class="vbtn v-${(v||'all').toLowerCase()} ${invState.verdict===v?'on':''}" data-v="${v}">${l}</span>`).join('')}</div>
      <button class="btn ghost" id="frescan">⟳ Re-scan</button>
    </div>
  </div>
  <div class="filters">
    ${['','hot','cold','exp','fr','sell','buy','listed','tradeable','nolink'].map(k=>`<span class="chip ${invState.quick===k?'on':''}" data-q="${k}">${({'':'All',hot:'🔥 Hot',cold:'❄️ Cold',exp:'Expiring ≤30d',fr:'Franchise',sell:'Sell signal',buy:'Buy signal',listed:'Listed',tradeable:'Tradeable',nolink:'⚠ Missing link'})[k]}</span>`).join('')}
    <span class="muted" style="margin-left:auto"><span id="invCount">${f.length.toLocaleString()}</span> cards · <span id="invVal">${fmtK(totalVal)}</span></span>
  </div>
  <div class="tbl-wrap"><table><thead><tr>
    ${[['player','Player'],['pos','Pos'],['team','Team'],['mult','×'],['ovr','OVR'],['est','Value'],['sal','Salary'],['verdict','Verdict'],['edge','Edge'],['conf','Conf'],['form','Form'],['tier','Tier'],['col','Collection'],['st','Status'],['days','Expires'],['sig','Signal'],['linked','GB Link']].map(([k,l])=>`<th data-s="${k}">${l}${arrow(k)}</th>`).join('')}
  </tr></thead><tbody id="invBody">
  ${slice.map((c,ix)=>invRowHTML(c,invState.page*invState.per+ix)).join('')}
  </tbody></table></div>
  <div class="pager">
    <button id="prev">‹ Prev</button>
    <span id="pagerLbl">Page ${invState.page+1} / ${pages}</span>
    <button id="next">Next ›</button>
    <select id="per"><option ${invState.per==50?'selected':''}>50</option><option ${invState.per==100?'selected':''}>100</option><option ${invState.per==250?'selected':''}>250</option></select>
  </div>`;
  // wire — natural-language query
  function runAsk(text){invState.nlText=text;invState.nl=parseNL(text);invState.page=0;renderInv();const a=$('#ask');if(a){a.focus();a.setSelectionRange(a.value.length,a.value.length);}}
  $('#askGo').onclick=()=>runAsk($('#ask').value);
  $('#ask').onkeydown=e=>{if(e.key==='Enter')runAsk(e.target.value);};
  if($('#askClear'))$('#askClear').onclick=()=>{invState.nlText='';invState.nl=null;invState.page=0;renderInv();};
  $$('#inv .exq').forEach(x=>x.onclick=()=>runAsk(x.dataset.q));
  // wire — filter panel
  $('#q').oninput=e=>{invState.q=e.target.value;invState.page=0;renderInv();$('#q').focus();$('#q').setSelectionRange(invState.q.length,invState.q.length);};
  $('#fpos').onchange=e=>{invState.pos=e.target.value;invState.page=0;renderInv();};
  $('#fteam').onchange=e=>{invState.team=e.target.value;invState.page=0;renderInv();};
  $('#fconf').onchange=e=>{invState.conf=e.target.value;invState.page=0;renderInv();};
  $('#ftype').onchange=e=>{invState.type=e.target.value;invState.page=0;renderInv();};
  $('#fsort').onchange=e=>{invState.sort=e.target.value;invState.dir=(e.target.value==='player')?1:(e.target.value==='days'?1:-1);invState.page=0;renderInv();};
  const num=(id,key)=>{const el=$(id);el.onchange=()=>{invState[key]=el.value;invState.page=0;renderInv();};};
  num('#fpmin','priceMin');num('#fpmax','priceMax');num('#fomin','ovrMin');num('#fomax','ovrMax');
  $$('#inv .mchip').forEach(ch=>ch.onclick=()=>{const m=+ch.dataset.m;const i=invState.mults.indexOf(m);if(i>=0)invState.mults.splice(i,1);else invState.mults.push(m);invState.page=0;renderInv();});
  $$('#inv .vbtn[data-v]').forEach(b=>b.onclick=()=>{invState.verdict=b.dataset.v;invState.page=0;renderInv();});
  // wire — expiration window slider (scoped refresh keeps dragging smooth)
  const loR=$('#expLoR'), hiR=$('#expHiR'), fill=$('#expFill'), lbl=$('#expLabel');
  function paintExp(){const a=+loR.value,b=+hiR.value,lo=Math.min(a,b),hi=Math.max(a,b);
    fill.style.left=(lo/EXPMAXDAYS*100)+'%';fill.style.right=(100-hi/EXPMAXDAYS*100)+'%';
    lbl.textContent=(lo>0||hi<EXPMAXDAYS)?`${fmtDay(lo)} → ${fmtDay(hi)} · ${lo}–${hi}d`:'all dates';}
  function commitExp(){const a=+loR.value,b=+hiR.value;invState.expLo=Math.min(a,b);invState.expHi=Math.max(a,b);invState.page=0;refreshRows();}
  function refreshRows(){const f=invFiltered();const pages=Math.max(1,Math.ceil(f.length/invState.per));if(invState.page>=pages)invState.page=0;
    const slice=f.slice(invState.page*invState.per,(invState.page+1)*invState.per);
    $('#invBody').innerHTML=slice.map((c,ix)=>invRowHTML(c,invState.page*invState.per+ix)).join('');
    $('#invCount').textContent=f.length.toLocaleString();$('#invVal').textContent=fmtK(f.reduce((s,c)=>s+c.est,0));
    $('#pagerLbl').textContent='Page '+(invState.page+1)+' / '+pages;wireRowLinks();}
  if(loR){loR.oninput=()=>{paintExp();commitExp();};hiR.oninput=()=>{paintExp();commitExp();};paintExp();}
  $$('#inv .exppreset').forEach(p=>p.onclick=()=>{const k=p.dataset.p;if(k==='all'){invState.expLo=0;invState.expHi=EXPMAXDAYS;}else{invState.expLo=0;invState.expHi=Math.min(+k,EXPMAXDAYS);}invState.page=0;renderInv();});
  $('#fclear').onclick=()=>{Object.assign(invState,{q:'',pos:'',team:'',conf:'',type:'',verdict:'',mults:[],priceMin:'',priceMax:'',ovrMin:'',ovrMax:'',quick:'',nl:null,nlText:'',expLo:0,expHi:EXPMAXDAYS});invState.page=0;renderInv();};
  $('#fapply').onclick=()=>{invState.page=0;renderInv();};
  $('#frescan').onclick=()=>{enrich();renderAll();toast('Re-scanned — verdicts & edges recalculated.');};
  $$('#inv th').forEach(th=>th.onclick=()=>{const k=th.dataset.s;if(invState.sort===k)invState.dir*=-1;else{invState.sort=k;invState.dir=(k==='player'||k==='team'||k==='pos'||k==='col'||k==='verdict'||k==='conf')?1:-1;}renderInv();});
  $$('#inv .chip').forEach(ch=>ch.onclick=()=>{invState.quick=ch.dataset.q;invState.page=0;renderInv();});
  $('#prev').onclick=()=>{if(invState.page>0){invState.page--;renderInv();}};
  $('#next').onclick=()=>{if(invState.page<pages-1){invState.page++;renderInv();}};
  $('#per').onchange=e=>{invState.per=+e.target.value;invState.page=0;renderInv();};
  // wire — GameBlazers links
  function wireRowLinks(){
    $$('#inv .lnkadd, #inv .lnkedit').forEach(b=>b.onclick=()=>{const c=invFiltered()[+b.dataset.k];if(c)setLink(keyOf(c));});
    $$('#inv .lnkfind').forEach(b=>b.onclick=()=>{const c=invFiltered()[+b.dataset.k];if(c)findCard(c);});
    $$('#inv .lnkhl').forEach(b=>b.onclick=()=>{const c=invFiltered()[+b.dataset.k];if(c)gbHighlight(c);});
    $$('#inv .rtInfo').forEach(b=>b.onclick=()=>{const c=invFiltered()[+b.dataset.k];if(c)openSheet(c);});
    $$('#inv .rtCmp').forEach(b=>b.onclick=()=>{const c=invFiltered()[+b.dataset.k];if(c)cmpAdd(c);});
    $$('#inv .rtTgt').forEach(b=>b.onclick=()=>{const c=invFiltered()[+b.dataset.k];if(!c)return;
      const ok=addTarget({player:c.player,mult:c.mult,col:c.col,pos:c.pos,team:c.team,fr:c.fr,
        max:c.mkt&&c.mkt.med!=null?+(c.mkt.med*0.85).toFixed(2):null,note:'Want another'});
      renderTargets(); renderDash(); toast(ok?`${c.player} added to your buy board.`:'Already on the board.');});
    // On phones the whole row is the tap target — opens the detail sheet.
    if(window.innerWidth<=760) $$('#inv tbody tr').forEach(tr=>tr.onclick=e=>{
      if(e.target.closest('a,button'))return;              // let links and tools win
      const c=invFiltered()[+tr.dataset.gi]; if(c)openSheet(c);});
  }
  wireRowLinks();
  $('#getLinks').onclick=openLinkWizard;
  $('#scanBtn').onclick=()=>$('#scanFile').click();
  $('#scanFile').onchange=e=>{const fl=e.target.files[0];if(fl)openScan(fl);e.target.value='';};
  $('#impLinks').onclick=()=>$('#impFile').click();
  $('#impFile').onchange=e=>{const fl=e.target.files[0];if(fl){const r=new FileReader();r.onload=ev=>importLinks(ev.target.result);r.readAsText(fl);}};
  $('#expMiss').onclick=exportMissing;
  $('#tplBtn').onclick=setTemplate;
  $('#expList').onclick=()=>{downloadText(invAsListings(),'gb_inventory_listings_format.txt');toast('Exported '+DATA.length+' cards in listings format.');};
  $('#expTable').onclick=()=>{downloadText(invAsTable(),'gb_inventory.txt');toast('Exported '+DATA.length+' cards as a text table.');};
  $('#expCopy').onclick=()=>{toast(copyText(invAsListings())?'Inventory copied to clipboard (listings format).':'Copy failed.');};
  $('#bkSave').onclick=backupData;
  $('#bkLoad').onclick=()=>$('#bkFile').click();
  $('#bkFile').onchange=e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=ev=>restoreData(ev.target.result);r.readAsText(f);}e.target.value='';};
}

/* ============== RENDER: MARKET MOVEMENT ============== */
function marketSection(){
  if(!MARKET){return `<div class="card"><h3>Market comps</h3><div class="empty">No market data yet.<br><br>Drop a <b>gb-listings .txt</b> on the upload box and every card you own gets priced against the live market, plus a snipe list of underpriced listings.</div></div>`;}
  const priced=DATA.filter(c=>c.mkt);
  const totalMkt=priced.reduce((s,c)=>s+c.mkt.med,0);
  const snipes=snipeList().slice(0,20);
  const rich=[...priced].sort((a,b)=>b.mkt.med-a.mkt.med).slice(0,15);
  const trendTag=m=>m.trend==null?'':` · <span class="${m.trend>=0?'up':'down'}">${m.trend>=0?'+':''}${(m.trend*100).toFixed(0)}% since ${m.pts} check${m.pts===1?'':'s'}</span>`;
  const row=c=>`<div class="sig-item"><div class="top"><span class="nm">${c.player} <span class=muted style=font-weight:400>${c.pos} · ${c.team} · ×${c.mult}${c.fr?' · FR':''}</span></span><span><b>${c.mkt.med}</b> <span class=muted style=font-size:11px>median ask</span>${c.mkt.series&&c.mkt.series.length>1?' '+sparkline(c.mkt.series):''}</span></div>
    <div class="rsn">${c.mkt.n} listing${c.mkt.n===1?'':'s'} · low ${c.mkt.min} / high ${c.mkt.max} · as of ${c.mkt.d}${trendTag(c.mkt)}${c.form?' · '+c.form.tag:''}</div></div>`;
  const srow=s=>`<div class="sig-item"><div class="top"><span class="nm">${s.l.player} <span class=muted style=font-weight:400>${s.l.pos} · ${s.l.team} · ×${s.l.mult}${s.l.status==='franchise'?' · FR':''}</span></span><span class="up"><b>${s.l.price}</b> vs ${s.med}</span></div>
    <div class="rsn">${(s.disc*100).toFixed(0)}% under the median of ${s.n} comps${s.l.id?` · <a class="gblink" href="${GB_ROUTES.listing(s.l.id)}" target="_blank" rel="noopener">↗ open listing</a>`:''}</div></div>`;
  return `<div class="kpis">
      <div class="kpi"><div class="lbl">Market data</div><div class="val">${MARKET.listings.length}</div><div class="meta">listings · loaded ${MARKET.date}</div></div>
      <div class="kpi"><div class="lbl">Your cards priced</div><div class="val" style="color:var(--cyan)">${priced.length}</div><div class="meta">of ${DATA.length} have a comp</div></div>
      <div class="kpi"><div class="lbl">Market value</div><div class="val" style="color:var(--green)">${totalMkt.toFixed(0)}</div><div class="meta">sum of median asks</div></div>
      <div class="kpi"><div class="lbl">Snipes</div><div class="val" style="color:#fcd34d">${snipeList().length}</div><div class="meta">listings ≥15% under comp</div></div>
    </div>
    <div class="grid2">
      <div class="card"><h3>🎯 Snipe list — underpriced listings</h3><div class="sig-col">${snipes.length?snipes.map(srow).join(''):'<div class="empty">No clear bargains in this data.</div>'}</div></div>
      <div class="card"><h3>💰 Your most valuable (by market)</h3><div class="sig-col">${rich.length?rich.map(row).join(''):'<div class="empty">No comps matched your cards.</div>'}</div></div>
    </div>`;
}
function renderMove(){
  const el=$('#move');
  if(HISTORY.length<2){
    el.innerHTML=marketSection()+`<div class="card"><h3>Market Movement</h3>
      <div class="empty">Market movement compares your uploads over time.<br><br>
      You have <b>${HISTORY.length}</b> snapshot${HISTORY.length===1?'':'s'} saved. Upload your CSV again later (after values change) and this view will show risers, fallers, new cards, and portfolio trend.</div></div>`;
    return;
  }
  const prev=HISTORY[HISTORY.length-2], cur=HISTORY[HISTORY.length-1];
  const moves=[];
  DATA.forEach(c=>{const k=keyOf(c);const p=prev.map[k];if(p!=null){const ch=c.est-p;if(ch!==0)moves.push({c,p,ch,pct:p?ch/p*100:0});}});
  const newCards=DATA.filter(c=>prev.map[keyOf(c)]==null);
  const curKeys=new Set(DATA.map(keyOf));
  const gone=Object.keys(prev.map).filter(k=>!curKeys.has(k));
  const risers=[...moves].filter(m=>m.ch>0).sort((a,b)=>b.pct-a.pct).slice(0,12);
  const fallers=[...moves].filter(m=>m.ch<0).sort((a,b)=>a.pct-b.pct).slice(0,12);
  const totDelta=cur.total-prev.total;
  // sparkline
  const max=Math.max(...HISTORY.map(h=>h.total));
  const spark=HISTORY.map(h=>`<div class="col" style="height:${h.total/max*100}%"><span>${fmtK(h.total)}</span></div>`).join('');
  const sparkX=HISTORY.map(h=>`<div>${h.date.slice(5)}</div>`).join('');
  const moveRow=m=>`<div class="sig-item"><div class="top"><span class="nm">${m.c.player} <span class=muted style=font-weight:400>${m.c.team} ×${m.c.mult}</span></span>
    <span class="${m.ch>0?'up':'down'}">${m.ch>0?'▲':'▼'} ${m.pct>0?'+':''}${m.pct.toFixed(1)}%</span></div>
    <div class="rsn">${fmt$(m.p)} → <b>${fmt$(m.c.est)}</b> (${m.ch>0?'+':''}${fmt$(m.ch)})</div></div>`;
  el.innerHTML=marketSection()+`
  <div class="kpis">
    <div class="kpi"><div class="lbl">Portfolio Change</div><div class="val ${totDelta>=0?'up':'down'}">${totDelta>=0?'+':''}${fmtK(totDelta)}</div><div class="meta">since ${prev.date}</div></div>
    <div class="kpi"><div class="lbl">Risers</div><div class="val up">${moves.filter(m=>m.ch>0).length}</div></div>
    <div class="kpi"><div class="lbl">Fallers</div><div class="val down">${moves.filter(m=>m.ch<0).length}</div></div>
    <div class="kpi"><div class="lbl">New Cards</div><div class="val">${newCards.length}</div><div class="meta">${gone.length} removed/sold</div></div>
  </div>
  <div class="card"><h3>Portfolio Value Over Time</h3><div class="spark">${spark}</div><div class="spark-x">${sparkX}</div></div>
  <div class="grid2">
    <div class="card"><h3>Top Risers</h3><div class="sig-col">${risers.length?risers.map(moveRow).join(''):'<div class="empty">No risers.</div>'}</div></div>
    <div class="card"><h3>Top Fallers</h3><div class="sig-col">${fallers.length?fallers.map(moveRow).join(''):'<div class="empty">No fallers.</div>'}</div></div>
  </div>
  <div class="card"><h3>New Since Last Upload (${newCards.length})</h3><div class="sig-col">${newCards.slice(0,20).map(c=>`<div class="sig-item"><div class="top"><span class="nm">${c.player} <span class=muted style=font-weight:400>${c.team} · ${c.col}</span></span><span>${fmt$(c.est)}</span></div></div>`).join('')||'<div class="empty">None.</div>'}</div></div>`;
}

/* ============== RENDER: SIGNALS ============== */
function renderSig(){
  const col=s=>{const arr=DATA.filter(c=>c.sig.s===s).sort((a,b)=>b.est-a.est);
    return {n:arr.length,val:arr.reduce((x,c)=>x+c.est,0),html:arr.slice(0,40).map(c=>`<div class="sig-item">
      <div class="top"><span class="nm">${c.player} <span class=muted style=font-weight:400>${c.pos} · ${c.team} ×${c.mult}</span></span><span>${fmt$(c.est)}</span></div>
      <div class="rsn">${c.sig.r}${c.exp?` · exp ${c.exp}`:''}</div></div>`).join('')};};
  const sell=col('SELL'),hold=col('HOLD'),buy=col('BUY');
  $('#sig').innerHTML=`
  <div class="kpis">
    <div class="kpi"><div class="lbl">Sell</div><div class="val" style="color:var(--red)">${sell.n}</div><div class="meta">${fmtK(sell.val)} · cash-out candidates</div></div>
    <div class="kpi"><div class="lbl">Hold</div><div class="val" style="color:var(--amber)">${hold.n}</div><div class="meta">${fmtK(hold.val)} · keep</div></div>
    <div class="kpi"><div class="lbl">Buy / Accumulate</div><div class="val" style="color:var(--green)">${buy.n}</div><div class="meta">${fmtK(buy.val)} · targets</div></div>
  </div>
  <div class="grid3">
    <div class="card"><h3>🔴 Sell (${sell.n})</h3><div class="sig-col">${sell.html||'<div class="empty">None.</div>'}</div></div>
    <div class="card"><h3>🟡 Hold (${hold.n})</h3><div class="sig-col">${hold.html||'<div class="empty">None.</div>'}</div></div>
    <div class="card"><h3>🟢 Buy (${buy.n})</h3><div class="sig-col">${buy.html||'<div class="empty">None.</div>'}</div></div>
  </div>
  <div class="legend" style="margin-top:6px">Signals weigh blended value (60% salary, 30% overall, 10% multiplier) against expiration. Franchise cards always HOLD. ▲/▼ in Inventory mark cards that moved &gt;12% since your last upload.</div>`;
}

/* ================================================================
   🎯 TARGETS — the buy board
   ================================================================ */
function renderTargets(){
  const hits=targetHits().length;
  const rows=TARGETS.map((t,i)=>{
    const st=targetStatus(t), m=st.m;
    const cls={hit:'t-hit',close:'t-close',far:'t-far',bought:'t-bought',nodata:'t-none'}[st.code];
    return `<div class="tgt-row ${cls}">
      <div class="tgt-main">
        <div class="tgt-nm">${targetLink(t)} <span class="mult-chip">×${t.mult}</span>${t.fr?' <span class="pill fr">FR</span>':''}</div>
        <div class="muted tgt-sub">${[t.pos,t.team,t.col].filter(Boolean).join(' · ')||'—'}${t.note?' · <i>'+esc(t.note)+'</i>':''}</div>
      </div>
      <div class="tgt-nums">
        <div><span class="muted">max</span> <b>${t.max!=null?fmt$(t.max):'—'}</b></div>
        <div><span class="muted">mkt</span> ${m&&m.med!=null?`<b>${fmt$(m.med)}</b> <span class=muted>(${m.n})</span>`:'<span class=muted>—</span>'}</div>
        ${m&&m.min!=null?`<div><span class="muted">low</span> ${fmt$(m.min)}</div>`:''}
      </div>
      <div class="tgt-act">
        <span class="tgt-badge ${cls}">${st.label}</span>
        <button class="btn xs tgtBuy" data-i="${i}">${t.bought?'↩ Unmark':'✓ Got it'}</button>
        <button class="btn xs ghost tgtDel" data-i="${i}">✕</button>
      </div></div>`;
  }).join('');

  $('#tgt').innerHTML=`
  <div class="card">
    <h3>🎯 Buy Targets ${hits?`<span class="pill buy">${hits} in range</span>`:''}</h3>
    <div class="muted" style="margin-bottom:10px">Cards you want to acquire. Set the most you'll pay and the board watches the market for you — it turns green the moment comps fall into range.${MARKET?'':' <b style="color:var(--amber)">Load a marketplace .txt to enable live comps.</b>'}</div>
    <div class="tgt-form">
      <input type="text" id="tgName" placeholder="Player name" autocomplete="off">
      <input type="number" id="tgMult" placeholder="Mult" step="0.1" min="1" value="1">
      <input type="number" id="tgMax" placeholder="Max $" step="0.01" min="0">
      <input type="text" id="tgNote" placeholder="Why? (optional)">
      <button class="btn" id="tgAdd">+ Add target</button>
    </div>
    <div id="tgSuggest" class="tg-suggest"></div>
  </div>
  <div class="card"><h3>Board (${TARGETS.length})</h3>
    ${rows||'<div class="empty">No targets yet. Add one above, or hit ⊕ on any card in Inventory, Compare, or Buy/Hold/Sell.</div>'}</div>`;

  $('#tgAdd').onclick=()=>{
    const nm=$('#tgName').value.trim();
    if(!nm){toast('Enter a player name first.');return;}
    const mx=parseFloat($('#tgMax').value);
    const known=DATA.find(c=>gbNorm(c.player)===gbNorm(nm));
    const ok=addTarget({player:known?known.player:nm, mult:parseFloat($('#tgMult').value)||1,
      max:isNaN(mx)?null:mx, note:$('#tgNote').value.trim(),
      pos:known?known.pos:'', team:known?known.team:'', col:known?known.col:''});
    if(!ok){toast('That target is already on the board.');return;}
    ['#tgName','#tgMax','#tgNote'].forEach(s=>$(s).value=''); renderTargets(); renderDash();
    toast(`Added ${nm} to your buy board.`);
  };
  // type-ahead off your own roster so names + multipliers stay consistent
  $('#tgName').oninput=e=>{
