<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GB Brain">
<meta name="theme-color" content="#0b0f17">
<title>GB Master Brain</title>
<style>
:root{--bg:#0b0f17;--panel:#141b2b;--panel2:#1b2538;--line:#26314a;--txt:#e8edf6;--mut:#8b97ad;
  --acc:#3b82f6;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--purple:#a855f7;--cyan:#06b6d4;
  --safe-t:env(safe-area-inset-top);--safe-b:env(safe-area-inset-bottom);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--txt);font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;overscroll-behavior-y:none}
body{padding-bottom:calc(72px + var(--safe-b))}
a{color:var(--acc);text-decoration:none}
.hdr{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,#101725,#0b0f17f2);backdrop-filter:blur(8px);padding:calc(10px + var(--safe-t)) 14px 10px;border-bottom:1px solid var(--line)}
.hrow{display:flex;align-items:center;gap:10px}
.logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--acc),var(--purple));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
.htitle{font-size:16px;font-weight:700;flex:1}
.htitle small{display:block;font-size:10px;color:var(--mut);font-weight:400}
.iconbtn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;width:34px;height:34px;font-size:15px;display:flex;align-items:center;justify-content:center}
.ask{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,#15203a,#1a1530);border:1px solid #2f3d5e;border-radius:11px;padding:9px 11px;margin-top:10px}
.ask span{color:var(--purple);font-size:16px}
.ask input{flex:1;background:transparent;border:0;color:var(--txt);font-size:15px;outline:none;min-width:0}
.ask input::placeholder{color:#6b7790}
.ask button{background:var(--acc);border:0;color:#fff;border-radius:8px;padding:6px 10px;font-size:13px;font-weight:600}
.qrow{display:flex;gap:7px;overflow-x:auto;margin-top:9px;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.qrow::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;background:var(--panel2);border:1px solid var(--line);border-radius:18px;padding:6px 12px;font-size:12.5px;color:var(--mut);white-space:nowrap}
.chip.on{background:var(--acc);color:#fff;border-color:var(--acc)}
.interp{font-size:12px;color:var(--purple);margin-top:8px}
.interp.warn{color:var(--amber)}
main{padding:14px}
.view{display:none}.view.active{display:block}
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px}
.kpi .l{color:var(--mut);font-size:10.5px;text-transform:uppercase;letter-spacing:.4px}
.kpi .v{font-size:22px;font-weight:800;margin-top:3px}
.kpi .m{font-size:10.5px;color:var(--mut);margin-top:2px}
.sec{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:14px}
.sec h3{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);margin-bottom:11px}
.bar{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.bar .n{width:84px;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.bar .t{flex:1;background:var(--panel2);border-radius:5px;height:15px;overflow:hidden}
.bar .f{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--acc),var(--cyan))}
.bar .vv{width:62px;text-align:right;font-size:11.5px;color:var(--mut);flex-shrink:0}
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:12px}
.toolbar select{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:9px;padding:9px 10px;font-size:14px}
.fbtn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:9px;padding:9px 13px;font-size:14px;font-weight:600;white-space:nowrap}
.fbtn.on{background:var(--acc);color:#fff;border-color:var(--acc)}
.fsheet{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px;margin-bottom:12px;display:flex;flex-direction:column;gap:12px}
.fsheet .fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fl{display:flex;flex-direction:column;gap:5px}
.fl>span{font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--mut)}
.fl select,.fl input{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:9px;padding:10px;font-size:14px;width:100%}
.mchips,.vchips{display:flex;gap:7px;flex-wrap:wrap}
.mc{background:var(--panel2);border:1px solid var(--line);border-radius:18px;padding:8px 13px;font-size:13px;color:var(--mut);min-width:48px;text-align:center}
.mc.on{background:var(--acc);color:#fff;border-color:var(--acc)}
.vc{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:8px 13px;font-size:13px;font-weight:700;color:var(--mut)}
.vc.v-buy{color:#86efac}.vc.v-watch{color:#93c5fd}.vc.v-fair{color:#fcd34d}.vc.v-avoid{color:#fca5a5}
.vc.on{color:#fff}.vc.on.v-buy{background:#16a34a;border-color:#16a34a}.vc.on.v-watch{background:#2563eb;border-color:#2563eb}.vc.on.v-fair{background:#b45309;border-color:#b45309}.vc.on.v-avoid{background:#b91c1c;border-color:#b91c1c}.vc.on.v-all{background:var(--acc);border-color:var(--acc)}
.dual{position:relative;height:34px;margin:8px 0 2px}
.dual-track{position:absolute;top:15px;left:0;right:0;height:5px;background:var(--bg);border-radius:4px}
.dual-fill{position:absolute;top:0;bottom:0;background:linear-gradient(90deg,var(--acc),var(--cyan));border-radius:4px}
.dual input[type=range]{position:absolute;top:0;left:0;width:100%;height:34px;margin:0;background:none;-webkit-appearance:none;appearance:none;pointer-events:none}
.dual input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:26px;height:26px;border-radius:50%;background:#fff;border:3px solid var(--acc);pointer-events:auto;box-shadow:0 1px 4px rgba(0,0,0,.5)}
.exppresets{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px;overflow-x:auto}
.exppreset{flex-shrink:0;background:var(--panel2);border:1px solid var(--line);border-radius:16px;padding:7px 12px;font-size:12.5px;color:var(--mut)}
.fclear{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:11px;font-size:14px;font-weight:600}
.formrow{margin-top:7px!important}
.fmtag{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:20px;border:1px solid var(--line)}
.fmtag.fm-hot{background:rgba(239,68,68,.16);color:#fca5a5}
.fmtag.fm-cold{background:rgba(59,130,246,.16);color:#93c5fd}
.fmtag.fm-up{background:rgba(34,197,94,.15);color:#86efac}
.fmtag.fm-down{background:rgba(245,158,11,.14);color:#fcd34d}
.fmtag.fm-mid{background:var(--panel2);color:var(--mut)}
.spark5{display:inline-flex;align-items:flex-end;gap:2px;height:18px;width:42px;margin-left:4px;vertical-align:middle}
.spark5 i{flex:1;background:linear-gradient(180deg,var(--cyan),var(--acc));border-radius:1px;min-height:2px}
.vchip{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;flex-shrink:0;border:1px solid var(--line)}
.vchip.v-buy{background:rgba(34,197,94,.16);color:#86efac}.vchip.v-watch{background:rgba(59,130,246,.16);color:#93c5fd}.vchip.v-fair{background:rgba(245,158,11,.14);color:#fcd34d}.vchip.v-avoid{background:rgba(239,68,68,.16);color:#fca5a5}
.count{font-size:12px;color:var(--mut);margin:2px 2px 10px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:12px 13px;margin-bottom:10px}
.card .top{display:flex;align-items:flex-start;gap:8px}
.card .nm{font-weight:700;font-size:15px;flex:1;line-height:1.25}
.card .sub{color:var(--mut);font-size:12.5px;margin-top:2px}
.pill{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;flex-shrink:0}
.pill.sell{background:rgba(239,68,68,.18);color:#fca5a5}
.pill.buy{background:rgba(34,197,94,.18);color:#86efac}
.pill.hold{background:rgba(245,158,11,.16);color:#fcd34d}
.tag{font-size:10px;color:var(--mut);border:1px solid var(--line);border-radius:5px;padding:1px 6px}
.tag.fr{color:#d8b4fe;border-color:#3a2d55}
.tag.listed{color:var(--cyan)}
.card .meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:9px}
.card .val{font-size:17px;font-weight:800}
.card .val small{font-size:11px;color:var(--mut);font-weight:400}
.exp{font-size:12px}.exp.soon{color:#fca5a5;font-weight:600}.exp.warn{color:#fcd34d}.exp.none{color:var(--mut)}
.go{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:11px;background:linear-gradient(135deg,var(--acc),#2563eb);color:#fff;border:0;border-radius:10px;padding:11px;font-size:14px;font-weight:700;width:100%}
.go.muted{background:var(--panel2);color:var(--amber);border:1px solid #5c4a1f}
.showmore{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:12px;font-size:14px;font-weight:600;margin-bottom:14px}
.empty{color:var(--mut);text-align:center;padding:34px 10px;font-size:13.5px}
.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;background:#0d1320f2;backdrop-filter:blur(8px);border-top:1px solid var(--line);padding-bottom:var(--safe-b)}
.tabbar button{flex:1;background:transparent;border:0;color:var(--mut);padding:10px 0 8px;font-size:10.5px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px}
.tabbar button .ic{font-size:19px;line-height:1}
.tabbar button.on{color:var(--acc)}
.legend{font-size:11px;color:var(--mut);margin-top:8px;line-height:1.5}
.spark{display:flex;align-items:flex-end;gap:5px;height:70px;margin-top:6px}
.spark .c{flex:1;background:linear-gradient(180deg,var(--acc),var(--purple));border-radius:3px 3px 0 0;min-height:3px}
.spark-x{display:flex;gap:5px;margin-top:5px}.spark-x div{flex:1;text-align:center;font-size:9px;color:var(--mut)}
.mv{display:flex;justify-content:space-between;gap:8px;padding:9px 0;border-bottom:1px solid #1b2335;font-size:13px}
.mv:last-child{border:0}
.up{color:var(--green)}.down{color:var(--red)}
.toast{position:fixed;left:50%;bottom:calc(86px + var(--safe-b));transform:translateX(-50%);background:var(--panel2);border:1px solid var(--line);padding:11px 16px;border-radius:10px;font-size:13px;z-index:50;display:none;max-width:88%;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:60;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:16px 16px 0 0;width:100%;max-height:90vh;overflow:auto;padding:18px 16px calc(18px + var(--safe-b))}
.modal h3{font-size:16px;margin-bottom:12px}
.modal ol{padding-left:20px;display:flex;flex-direction:column;gap:9px;margin-bottom:14px}
.modal li{font-size:13.5px;line-height:1.5}
.modal .acts{display:flex;flex-direction:column;gap:9px}
.modal .acts button{padding:13px;border-radius:11px;font-size:15px;font-weight:700;border:0}
.b-pri{background:var(--acc);color:#fff}.b-sec{background:var(--panel2);color:var(--txt);border:1px solid var(--line)!important}
.note{font-size:12px;color:var(--mut);background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:10px;margin-top:12px;line-height:1.5}
.scanprog{padding:16px 4px}
.pbar{height:7px;background:var(--panel2);border-radius:5px;overflow:hidden;margin-top:9px}
.pbar>div{height:100%;width:0;background:linear-gradient(90deg,var(--acc),var(--cyan));transition:width .2s}
#scanBody{max-height:64vh;overflow:auto}
.scard{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:12px;margin-bottom:11px}
.stitle{font-weight:700;font-size:15px;margin-bottom:9px}
.lmult{display:inline-block;background:var(--acc);color:#fff;font-size:13px;font-weight:800;padding:2px 9px;border-radius:7px;margin-left:6px;vertical-align:middle}
.smeta{font-weight:400;font-size:12.5px;color:var(--mut);margin-top:3px}
.svar{background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:10px;margin-top:8px}
.svar.hit{border-color:var(--acc);box-shadow:0 0 0 1px var(--acc)}
.svtop{display:flex;align-items:center;gap:8px;font-size:14px}
.hitb{background:rgba(59,130,246,.18);color:#93c5fd;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:20px}
.psearch{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:10px 12px;margin-top:10px}
.psearch span{color:var(--mut);font-size:15px}
.psearch input{flex:1;background:transparent;border:0;color:var(--txt);font-size:16px;outline:none;min-width:0}
.psearch input::placeholder{color:#6b7790}
.psearch button{background:var(--line);border:0;color:var(--txt);width:24px;height:24px;border-radius:50%;font-size:12px;flex-shrink:0}
input[type=file]{display:none}
</style>
</head>
<body>
<div class="hdr">
  <div class="hrow">
    <div class="logo">GB</div>
    <div class="htitle">Master Brain<small id="sub">— cards</small></div>
    <button class="iconbtn" id="scanBtn" title="Scan marketplace screenshot">📷</button>
    <button class="iconbtn" id="linkBtn" title="Get links">⚡</button>
    <button class="iconbtn" id="upBtn" title="Upload CSV">⬆</button>
    <input type="file" id="file" accept=".csv">
    <input type="file" id="scanFile" accept="image/*">
  </div>
  <div class="psearch" id="psearchWrap">
    <span>🔎</span>
    <input id="psearch" type="search" placeholder="Search player… (Josh, Allen, McCaf…)" enterkeyhint="search" autocapitalize="off" autocorrect="off">
    <button id="pclear" style="display:none">✕</button>
  </div>
  <div class="ask" id="askWrap">
    <span>✦</span>
    <input id="ask" placeholder="Ask: “highest value QB”, “expiring this week”…" enterkeyhint="search">
    <button id="askGo">Ask</button>
  </div>
  <div class="qrow" id="chips"></div>
  <div class="interp" id="interp" style="display:none"></div>
</div>
<main>
  <section class="view" id="home"></section>
  <section class="view active" id="cards"></section>
  <section class="view" id="signals"></section>
  <section class="view" id="market"></section>
</main>
<div class="tabbar">
  <button data-v="home"><span class="ic">▦</span>Home</button>
  <button data-v="cards" class="on"><span class="ic">🃏</span>Cards</button>
  <button data-v="signals"><span class="ic">⚑</span>Signals</button>
  <button data-v="market"><span class="ic">📈</span>Market</button>
</div>
<div class="toast" id="toast"></div>

/* CSV parse + itemId/url detect */
function parseCSV(text){
  const rows=[];let i=0,f='',row=[],q=false;text=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  while(i<text.length){const ch=text[i];if(q){if(ch=='"'){if(text[i+1]=='"'){f+='"';i++;}else q=false;}else f+=ch;}else{if(ch=='"')q=true;else if(ch==','){row.push(f);f='';}else if(ch=='\n'){row.push(f);rows.push(row);row=[];f='';}else f+=ch;}i++;}
  if(f.length||row.length){row.push(f);rows.push(row);}
  const head=rows.shift().map(h=>h.trim());
  const ix=n=>head.indexOf(n);
  const ixA=ns=>{for(const n of ns){const j=head.findIndex(h=>h.toLowerCase()===n.toLowerCase());if(j>=0)return j;}return -1;};
  const uCol=ixA(['Url','URL','Link','ListingUrl','MarketplaceUrl','CardUrl','ItemUrl']);
  const iCol=ixA(['ItemId','ItemID','ListingId','CardId','Id']);
  const l5Col=ixA(['Last5','Last5Scoring','RecentScoring']);
  const l5pCol=ixA(['Last5Pct','Last5Percentile','RecentPercentile']);
  const g=(r,j)=>j>=0&&j<r.length?r[j].trim():'';
  const nums=s=>s?s.split(/[|,;]/).map(x=>parseFloat(x)).filter(x=>!isNaN(x)):[];
  const out=[];
  for(const r of rows){if(r.length<head.length||(r.length===1&&r[0]===''))continue;
    const c={player:r[ix('Player')].trim(),pos:r[ix('Positions')].trim(),team:r[ix('Team')].trim(),
      mult:parseFloat(r[ix('Multiplier')])||1,ovr:parseInt(r[ix('Overall')])||0,
      fr:r[ix('Franchise')].trim()==='Yes',rk:r[ix('Rookie')].trim()==='Yes',tr:r[ix('Tradeable')].trim()==='Yes',
      sal:parseInt(r[ix('Salary')])||0,col:r[ix('Collection')].trim(),st:r[ix('Status')].trim(),
      exp:(r[ix('Expires')].trim()==='N/A'||!r[ix('Expires')].trim())?null:r[ix('Expires')].trim()};
    const id=g(r,iCol);if(id)c.id=id;c._url=g(r,uCol);
    const l5=nums(g(r,l5Col));if(l5.length)c.l5=l5;const l5p=nums(g(r,l5pCol));if(l5p.length)c.l5p=l5p;
    out.push(c);
  }
  return out;
}
function ingest(text){
  const p=parseCSV(text);if(!p.length){toast('No rows found in that CSV.');return;}
  let added=0;p.forEach(c=>{if(c._url&&/^https?:\/\/\S+\.\S+/.test(c._url)){LINKS[c.id||keyOf(c)]=c._url.trim();added++;}delete c._url;});
  const withId=p.filter(c=>c.id).length;
  localStorage.setItem(LS_LINKS,JSON.stringify(LINKS));
  DATA=p;snapshot();setPrev();renderAll();
  const linked=DATA.filter(c=>c.linked).length;
  toast('Loaded '+p.length+' cards · '+linked+' linked'+(withId?' (itemIds detected)':'')+'.');
  go('cards');
}

/* ===== Natural-language query ===== */
const MO={january:1,february:2,march:3,april:4,may:5,june:6,july:7,august:8,september:9,october:10,november:11,december:12,jan:1,feb:2,mar:3,apr:4,jun:6,jul:7,aug:8,sep:9,sept:9,oct:10,nov:11,dec:12};
const POS={qb:'Qb',quarterback:'Qb',rb:'Rb','running back':'Rb',wr:'Wr',receiver:'Wr','wide receiver':'Wr',te:'Te','tight end':'Te'};
const pad=n=>String(n).padStart(2,'0');
function yearFor(m){const tm=TODAY.getMonth()+1;return m>=tm?TODAY.getFullYear():TODAY.getFullYear()+1;}
function findDate(t){let m;if(m=t.match(/(\d{4})-(\d{1,2})-(\d{1,2})/))return m[1]+'-'+pad(+m[2])+'-'+pad(+m[3]);
  if(m=t.match(/\b(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?\b/)){let y=m[3]?(+m[3]<100?2000+ +m[3]:+m[3]):yearFor(+m[1]);return y+'-'+pad(+m[1])+'-'+pad(+m[2]);}
  const mn=Object.keys(MO).join('|');
  if(m=t.match(new RegExp('\\b('+mn+')\\b\\.?\\s+(\\d{1,2})(?:st|nd|rd|th)?(?:,?\\s*(\\d{4}))?','i'))){const mo=MO[m[1].toLowerCase()];return (m[3]?+m[3]:yearFor(mo))+'-'+pad(mo)+'-'+pad(+m[2]);}
  return null;}
function parseNL(raw){
  if(!raw||!raw.trim())return null;const t=raw.toLowerCase(),preds=[],label=[];let sort=null,dir=-1,limit=null;
  for(const w of Object.keys(POS).sort((a,b)=>b.length-a.length)){if(new RegExp('\\b'+w+'\\b').test(t)){const p=POS[w];preds.push(c=>c.pos===p);label.push(p.toUpperCase());break;}}
  if(/\bfranchise\b/.test(t)){preds.push(c=>c.fr);label.push('Franchise');}
  if(/\btradeable\b|\btradable\b/.test(t)){preds.push(c=>c.tr);label.push('Tradeable');}
  if(/\blisted\b|\bfor sale\b|\bon (the )?market\b/.test(t)){preds.push(c=>c.st==='Listed');label.push('Listed');}
  if(/\bunlinked\b|\bnot linked\b|\b(missing|no|without|needs?)\b\s*(a\s*)?(gb\s*)?(link|url)/.test(t)){preds.push(c=>!c.linked);label.push('missing link');}
  const teams=[...new Set(DATA.map(c=>c.team))];for(const tm of teams){if(new RegExp('\\b'+tm.toLowerCase()+'\\b').test(t)){preds.push(c=>c.team===tm);label.push(tm);break;}}
  let m;
  if(m=t.match(/(?:value|worth|salary)\s*(?:of\s*)?(?:over|above|more than|>=|>)\s*\$?([\d.,]+\s*[km]?)/)){const v=money(m[1]);if(v!=null){preds.push(c=>c.est>=v);label.push('value ≥ '+fmtK(v));}}
  if(m=t.match(/(?:value|worth|salary)\s*(?:of\s*)?(?:under|below|less than|<=|<)\s*\$?([\d.,]+\s*[km]?)/)){const v=money(m[1]);if(v!=null){preds.push(c=>c.est<=v);label.push('value ≤ '+fmtK(v));}}
  if(/\b(highest|most valuable|top|best|priciest|expensive)\b/.test(t)){sort='est';dir=-1;label.push('value high→low');}
  else if(/\b(lowest|cheapest|least valuable)\b/.test(t)){sort='est';dir=1;label.push('value low→high');}
  if(m=t.match(/\b(?:top|first|highest)\s+(\d{1,3})\b/)){limit=+m[1];if(!sort){sort='est';dir=-1;}label.push('top '+limit);}
  const hasExp=/\bexpir/.test(t);
  if(/\bnever expir|\bno expir/.test(t)){preds.push(c=>!c.exp);label.push('never expires');}
  else if(/\bexpired\b/.test(t)){preds.push(c=>c.exp&&c.days<0);label.push('expired');}
  else if(/\bbetween\b/.test(t)){const parts=t.split(/\band\b/);const d1=findDate(parts[0]||''),d2=findDate(parts[1]||'');if(d1&&d2){preds.push(c=>c.exp&&c.exp>=d1&&c.exp<=d2);label.push('exp '+d1+'→'+d2);}}
  else{const after=/\b(or later|after|from|later than|on or after)\b/.test(t),before=/\b(or earlier|before|by|up to|no later than|earlier than)\b/.test(t),d=findDate(t);
    if(d&&after){preds.push(c=>c.exp&&c.exp>=d);label.push('expires ≥ '+d);}
    else if(d&&before){preds.push(c=>c.exp&&c.exp<=d);label.push('expires ≤ '+d);}
    else if(d&&hasExp){preds.push(c=>c.exp===d);label.push('expires '+d);}
    else if(/\bthis week\b|\bnext 7 days\b/.test(t)){preds.push(c=>c.exp&&c.days>=0&&c.days<=7);label.push('expires ≤7d');}
    else if(/\bthis month\b/.test(t)){let ey=TODAY.getFullYear(),em=TODAY.getMonth()+1;if(TODAY.getDate()>=25){if(em>=12){em=1;ey++}else em++;}const dd=new Date(ey,em,0).getDate();const e=ey+'-'+pad(em)+'-'+pad(dd);const ti=TODAY.getFullYear()+'-'+pad(TODAY.getMonth()+1)+'-'+pad(TODAY.getDate());preds.push(c=>c.exp&&c.exp>=ti&&c.exp<=e);label.push('expires this month');}
    else if(m=t.match(/\b(?:next|within|in)\s+(\d{1,3})\s+days?\b/)){const n=+m[1];preds.push(c=>c.exp&&c.days>=0&&c.days<=n);label.push('expires ≤'+n+'d');}
    else if(/\bexpiring soon\b/.test(t)){preds.push(c=>c.exp&&c.days>=0&&c.days<=14);label.push('expires ≤14d');}
    else if(hasExp&&!sort){preds.push(c=>c.exp&&c.days>=0);label.push('has expiration');sort='days';dir=1;}}
  if(/\bsell\b/.test(t)&&!label.length){preds.push(c=>c.sig.s==='SELL');label.push('Sell');}
  if(/\bbuy\b/.test(t)&&!label.length){preds.push(c=>c.sig.s==='BUY');label.push('Buy');}
  if(!preds.length&&!sort)return{preds:[],sort:null,dir:-1,limit:null,label:[],unmatched:true};
  return{preds,sort,dir,limit,label,unmatched:false};
}
function money(s){s=s.replace(/[$,\s]/g,'').toLowerCase();let n=parseFloat(s);if(/k$/.test(s))n*=1e3;if(/m$/.test(s))n*=1e6;return isNaN(n)?null:n;}

/* ===== Marketplace screenshot scanner (client-side OCR) ===== */
function ensureTesseract(){return window.Tesseract?Promise.resolve():new Promise((res,rej)=>{const sc=document.createElement('script');sc.src='https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.1/tesseract.min.js';sc.onload=res;sc.onerror=()=>rej(new Error('Could not load the OCR engine — you need an internet connection the first time you scan.'));document.head.appendChild(sc);});}
async function ocrImage(file,onProg){await ensureTesseract();const{data}=await Tesseract.recognize(file,'eng',{logger:m=>{if(m.status==='recognizing text'&&onProg)onProg(Math.round(m.progress*100));}});return data.text||'';}
function detectListings(text){
  const S=text.toLowerCase().replace(/[^a-z0-9. ]/g,' ').replace(/\s+/g,' ');   // keep decimals for multipliers
  const SN=S.replace(/\./g,' ');                                                // dots→space (same length) so names align with multiplier offsets
  const words=[];{let off=0;for(const w of SN.split(' ')){words.push({w,at:off});off+=w.length+1;}}
  const wpos=(tok,near,win)=>{let best=-1,bd=1e9;for(const o of words){const eq=o.w===tok||(tok.length>=5&&o.w.length>=5&&Math.abs(o.w.length-tok.length)<=2&&gbLev(o.w,tok)<=1);if(!eq)continue;if(near==null){if(best<0)best=o.at;continue;}const d=Math.abs(o.at-near);if(d<bd){bd=d;best=o.at;}}return near==null?best:(best>=0&&bd<=win?best:-1);};
  const mults=[];let m;const re=/(1(?:\.[0-5])?|\.[0-9])\s*x/g;                  // GB multipliers 1.0–1.5, badge ends in x
  while(m=re.exec(S)){let v=parseFloat(m[1]);if(v>=1&&v<=1.5)mults.push({v:Math.round(v*10)/10,at:m.index});}
  const colHits=[];[...new Set(DATA.map(c=>c.col))].forEach(cn=>{const n=gbNorm(cn);if(n.length<4)return;let i=S.indexOf(n);while(i>=0){colHits.push({col:cn,at:i});i=S.indexOf(n,i+n.length);}});
  const players=[...new Set(DATA.map(c=>c.player))];const found=[];
  for(const p of players){const raw=gbNorm(p).split(' ').filter(Boolean);if(!raw.length)continue;
    const last=raw[raw.length-1];if(last.length<3)continue;const li=wpos(last,null);if(li<0)continue;
    if(raw.length>=2&&wpos(raw[0],li,55)<0)continue;   // require the first name/initial near the last name → no more Dyami≠A.J. mixups
    found.push({player:p,at:li});}
  const seen={};const listings=found.filter(f=>{if(seen[f.player])return false;seen[f.player]=1;return true;}).sort((a,b)=>a.at-b.at);
  const nearest=(arr,at,win)=>{let best=null,bd=1e9;for(const o of arr){const d=Math.abs(o.at-at);if(d<bd){bd=d;best=o;}}return(best&&bd<win)?best:null;};
  listings.forEach(l=>{const mm=nearest(mults,l.at,120);l.mult=mm?mm.v:null;const cc=nearest(colHits,l.at,120);l.col=cc?cc.col:null;});
  return listings;
}
function scanMatches(listings){return listings.map(l=>{
  const all=DATA.filter(c=>gbNorm(c.player)===gbNorm(l.player));
  let exact=null;
  if(l.mult!=null){let cand=all.filter(c=>Math.abs(c.mult-l.mult)<0.05);if(l.col){const cc=cand.filter(c=>c.col===l.col);if(cc.length)cand=cc;}exact=cand.slice().sort((a,b)=>b.est-a.est)[0]||null;}
  const variants={};all.forEach(c=>{(variants[c.mult]=variants[c.mult]||{mult:c.mult,cards:[]}).cards.push(c);});
  const vlist=Object.values(variants).sort((a,b)=>b.mult-a.mult).map(v=>{const best=v.cards.slice().sort((a,b)=>b.est-a.est)[0];return{mult:v.mult,count:v.cards.length,best,match:l.mult!=null&&Math.abs(v.mult-l.mult)<0.05};});
  return{player:l.player,detMult:l.mult,detCol:l.col,exact,owned:all.length>0,variants:vlist};});}
function openScan(file){
  const ov=document.createElement('div');ov.className='ov';ov.innerHTML='<div class="modal"><h3>📷 Scan marketplace</h3><div id="scanBody"><div class="scanprog">Reading the screenshot… <b id="scanPct">0%</b><div class="pbar"><div id="pbarf"></div></div><div class="muted" style="font-size:12px;margin-top:8px">First scan downloads the OCR engine (needs internet). This can take a moment.</div></div></div><div class="acts" style="margin-top:14px"><button class="b-sec" id="scanClose">Close</button></div></div>';
  document.body.appendChild(ov);ov.onclick=e=>{if(e.target===ov)ov.remove();};ov.querySelector('#scanClose').onclick=()=>ov.remove();

    .then(text=>{const listings=detectListings(text);const res=scanMatches(listings);renderScan(ov,res,text);})
    .catch(err=>{ov.querySelector('#scanBody').innerHTML='<div class="empty">'+err.message+'</div>';});
}
function renderScan(ov,res,rawText){
  const body=ov.querySelector('#scanBody');
  if(!res.length){body.innerHTML='<div class="empty">Couldn’t match any of your players in that image.<br><br>Tips: crop to just the listings, use a sharp full-res screenshot, and make sure the player names are legible.</div>';return;}
  const vlabel={BUY:'Buy',WATCH:'Watch',FAIR:'Fair',AVOID:'Avoid'};
  const cardLine=c=>{const url=urlFor(c);return '<div class="muted" style="font-size:12.5px;margin-top:3px">'+fmt$(c.est)+' · '+c.pos.toUpperCase()+' '+c.team+' · '+c.col+(c.edge!=null?' · '+(c.edge>=0?'+':'')+c.edgePct+'% edge':'')+(c.form?' · '+c.form.tag:'')+'</div>'+(url?'<a class="go" style="margin-top:8px;padding:9px" href="'+url+'" target="_blank" rel="noopener">Open in GameBlazers ↗</a>':'<span class="muted" style="font-size:12px">no link yet — add one in Cards</span>');};
  const html=res.map(r=>{
    const mlabel=r.detMult!=null?('×'+r.detMult):'×?';
    const meta=r.exact?(r.exact.pos.toUpperCase()+' · '+r.exact.team+' · '+r.exact.col):(r.detCol||(r.variants[0]&&r.variants[0].best.pos.toUpperCase()+' · '+r.variants[0].best.team)||'');
    let inner;
    if(r.exact){
      inner='<div class="svar hit"><div class="svtop"><b>×'+r.exact.mult+'</b> <span class="hitb">listed card</span><span style="flex:1"></span><span class="vchip v-'+r.exact.verdict.toLowerCase()+'">'+vlabel[r.exact.verdict]+'</span></div>'+cardLine(r.exact)+'</div>';
      const others=r.variants.filter(v=>!v.match);
      if(others.length)inner+='<div class="muted" style="font-size:11.5px;margin:11px 0 4px">Other multipliers you own:</div>'+others.map(v=>'<div class="svar"><div class="svtop"><b>×'+v.mult+'</b><span style="flex:1"></span><span class="muted" style="font-size:12.5px">'+fmt$(v.best.est)+' · own '+v.count+'</span></div></div>').join('');
    } else {
      inner='<div class="muted" style="font-size:12px;margin-bottom:6px">Couldn’t read the ×multiplier from the image — tap the one that matches the listing:</div>'+r.variants.map(v=>'<div class="svar"><div class="svtop"><b>×'+v.mult+'</b><span style="flex:1"></span><span class="vchip v-'+v.best.verdict.toLowerCase()+'">'+vlabel[v.best.verdict]+'</span></div>'+cardLine(v.best)+'</div>').join('');
    }
    return '<div class="scard"><div class="stitle">'+r.player+' <span class="lmult">'+mlabel+'</span>'+(meta?'<div class="smeta">'+meta+'</div>':'')+'</div>'+inner+'</div>';
  }).join('');
  body.innerHTML='<div class="muted" style="font-size:12.5px;margin-bottom:10px">Matched '+res.length+' player'+(res.length===1?'':'s')+'. Each listing shows the player, its ×multiplier, and card type.</div>'+html;
}

function exporterScript(){try{return decodeURIComponent(escape(atob(EXPORTER_B64)));}catch(e){return atob(EXPORTER_B64);}}
$('#linkBtn').onclick=()=>{
  const ov=document.createElement('div');ov.className='ov';
  ov.innerHTML='<div class="modal"><h3>Get links for your cards</h3>'
    +'<ol><li>This export step is easiest on a <b>computer</b>. On a laptop, open <b>app.gameblazers.com</b> (logged in), Dashboard tab.</li>'
    +'<li>Open the browser console (Mac <b>⌥⌘J</b>), tap <b>Copy script</b>, paste, Enter.</li>'
    +'<li>Open the <b>Inventory</b> tab, click <b>“Load More”</b> to the bottom.</li>'
    +'<li>Type <b>gbCSV()</b>, Enter — a CSV downloads.</li>'
    +'<li>AirDrop/iCloud that CSV to your iPhone, then tap <b>⬆</b> here to load it. Every card gets its link.</li></ol>'
    +'<div class="acts"><button class="b-pri" id="cp">📋 Copy script</button><button class="b-sec" id="op">↗ Open GameBlazers</button><button class="b-sec" id="cl">Close</button></div>'
    +'<div class="note">On <b>iPhone</b>, tapping a card’s <b>Open in GameBlazers</b> button opens the GameBlazers app right to that card (universal links). On desktop it bounces to the dashboard — that’s a GameBlazers limitation.</div></div>';
  document.body.appendChild(ov);
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
  ov.querySelector('#cl').onclick=()=>ov.remove();
  ov.querySelector('#op').onclick=()=>window.open(GB_APP,'_blank');
  ov.querySelector('#cp').onclick=()=>{toast(copyText(exporterScript())?'Script copied.':'Copy failed — try on desktop.');};
};
